<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ANUSA Decisions Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .site-header {
      background: #1a2e6e;
      border-bottom: none;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .site-header .logo {
      font-family: 'Roboto Slab', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    /* ── Filters bar ── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: .6rem 1.5rem;
      display: flex;
      gap: .75rem;
      flex-shrink: 0;
    }
    .filters input,
    .filters select {
      padding: .45rem .7rem;
      font-size: .875rem;
      font-family: 'Roboto', sans-serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      color: #333;
      outline: none;
    }
    .search-wrap { flex: 2; position: relative; display: flex; align-items: center; }
    .search-wrap input { flex: 1; padding-right: 2rem; }
    .search-clear {
      position: absolute; right: .5rem;
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 1.1rem; line-height: 1;
      padding: 0; display: none;
    }
    .search-clear:hover { color: #555; }
    .search-wrap.has-value .search-clear { display: block; }
    .filters select { flex: 1 }
    .filters input:focus,
    .filters select:focus { border-color: #1a2e6e; background: #fff }

    /* ── Split layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: list ── */
    .list-panel {
      width: 380px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      background: #fff;
    }

    .meeting-group { }
    .meeting-heading {
      position: sticky;
      top: 0;
      background: #f0f2f4;
      border-bottom: 1px solid #dde0e4;
      border-top: 1px solid #dde0e4;
      padding: .55rem 1rem;
      font-size: .82rem;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .15s, color .15s;
    }
    .meeting-heading:hover { background: #e8eaf0; color: #1a2e6e; }
    .meeting-heading:hover .meeting-heading-arrow { opacity: 1; transform: translateX(2px); }
    .meeting-heading.active { background: #e8eaf0; color: #1a2e6e; border-left: 3px solid #1a2e6e; }
    .meeting-heading-arrow { font-size: 1rem; opacity: .4; transition: opacity .15s, transform .15s; }
    .meeting-heading.active .meeting-heading-arrow { opacity: 1; }

    .decision-row {
      padding: .8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      align-items: flex-start;
      gap: .75rem;
    }
    .decision-row:hover { background: #f5f6f9 }
    .decision-row { border-left: 3px solid transparent }
    .decision-row.active { background: #eef0f7; border-left: 3px solid #1a2e6e }

    .row-id {
      font-size: .7rem;
      color: #999;
      font-weight: 600;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 60px;
    }
    .row-body { flex: 1; min-width: 0 }
    .row-title {
      font-size: .9rem;
      font-weight: 600;
      color: #1a2e6e;
      line-height: 1.3;
      margin-bottom: .25rem;
    }
    .row-meta {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .15em .5em;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 600;
    }
    .badge-type {
      background: #eef2ff;
      color: #3730a3;
    }
    .badge-passed {
      background: #dcfce7;
      color: #166534;
    }
    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }
    .badge-friendly {
      background: #e0f8e9;
      color: #047a37;
    }
    .badge-unfriendly {
      background: #fde0e0;
      color: #a30e0e;
    }
    .badge-withdrawn {
      background: #f3f0ff;
      color: #5b21b6;
    }
    .badge-lapsed {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-bloc {
      background: #ebf0ff;
      color: #1e40af;
    }
    .bloc-notice {
      font-size: .82rem;
      color: #1e40af;
      background: #ebf0ff;
      border: 1px solid #c7d7fd;
      border-radius: 6px;
      padding: .5rem .75rem;
      margin-top: .5rem;
      line-height: 1.6;
    }
    .bloc-link {
      background: none;
      border: none;
      color: #1e40af;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-align: left;
      padding: 0;
      display: inline;
    }
    .bloc-link:hover { text-decoration-style: solid; }

    /* ── Right panel: detail ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2.5rem;
      background: #f4f5f7;
    }

    .detail-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
    }

    .detail-content { max-width: 720px }

    .detail-header {
      margin-bottom: 1.5rem;
    }
    .detail-id {
      font-size: .8rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .detail-title {
      font-family: 'Roboto Slab', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2e6e;
      line-height: 1.25;
      margin-bottom: .75rem;
    }
    .detail-badges { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem 1.5rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .detail-meta-grid .meta-item:first-child { grid-column: 1 / -1; }
    .meta-item { }
    .meta-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #999;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .meta-value { font-size: .9rem; color: #333; overflow-wrap: break-word; word-break: break-word; }

    .detail-section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .detail-section-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #999;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    .markdown-body {
      font-size: .9rem;
      color: #444;
      line-height: 1.7;
      overflow-wrap: break-word;
    }
    .markdown-body p { margin-bottom: .75rem }
    .markdown-body p:last-child { margin-bottom: 0 }
    .markdown-body ol, .markdown-body ul { padding-left: 1.25rem; margin-bottom: .75rem }
    .markdown-body li { margin-bottom: .4rem; line-height: 1.6 }
    .markdown-body li:last-child { margin-bottom: 0 }
    .markdown-body strong { font-weight: 600; color: #333 }
    .markdown-body em { font-style: italic }
    .markdown-body a { color: #366BEF }
    .markdown-body a:hover { text-decoration: underline }
    .markdown-body blockquote {
      border-left: 3px solid #d0d0d0;
      padding-left: .75rem;
      color: #666;
      margin: .5rem 0;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      font-family: 'Roboto Slab', serif;
      font-weight: 700; color: #222; margin: 1rem 0 .4rem;
    }

    .amendments-list { list-style: none }
    .amendment-item {
      padding: .6rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: .875rem;
    }
    .amendment-item:last-child { border-bottom: none }
    .amendment-text { flex: 1; color: #444 }
    .amendment-result {
      font-weight: 700;
      font-size: .8rem;
    }
    .amendment-result.passed { color: #166534 }
    .amendment-result.failed { color: #991b1b }

    .amendment-main { flex: 1 }
    .amendment-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .amendment-full-text {
      margin-top: .4rem;
      font-size: .85rem;
      color: #555;
      line-height: 1.5;
      padding-left: .25rem;
      border-left: 2px solid #e0e0e0;
    }
    .amendment-movers {
      margin-top: .25rem;
      font-size: .78rem;
      color: #999;
    }
    .minutes-link {
      font-size: .8rem;
      color: #366BEF;
      text-decoration: none;
    }
    .minutes-link:hover { text-decoration: underline }

    .meta-item-full { grid-column: 1 / -1; border-top: 1px solid #f0f0f0; padding-top: .5rem; margin-top: .25rem; }
    .minutes-page-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .875rem;
      color: #366BEF;
      text-decoration: none;
      font-weight: 500;
    }
    .minutes-page-link:hover { text-decoration: underline }

    /* ── Meeting info link button ── */
    .meeting-info-link {
      background: none;
      border: none;
      color: #366BEF;
      font-family: 'Roboto', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }
    .meeting-info-link:hover { text-decoration: underline; }

    /* ── Disclaimer bar (below header) ── */
    .disclaimer-bar {
      flex-shrink: 0;
      background: #fffbe6;
      border-bottom: 1px solid #e8d96a;
      padding: .4rem 1.5rem;
      font-size: .75rem;
      color: #7a6500;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .disclaimer-bar { padding: .4rem 1rem; }
    }

    /* Hide filters on mobile when a detail view is open */
    @media (max-width: 640px) {
      .filters.mobile-hidden { display: none; }
    }

    /* ── Empty state ── */
    .no-results {
      padding: 2rem 1rem;
      text-align: center;
      color: #aaa;
      font-size: .9rem;
    }

    /* ── Back button (mobile only) ── */
    .back-btn {
      display: none;
      align-items: center;
      gap: .4rem;
      background: none;
      border: none;
      color: #1a2e6e;
      font-family: 'Roboto', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      padding: .75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
      width: 100%;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .back-btn:hover { background: #f5f6f9 }

    /* ── Meeting motion rows ── */
    .meeting-motion-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .65rem .5rem;
      border-bottom: 1px solid #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      transition: background .1s;
    }
    .meeting-motion-row:last-child { border-bottom: none; }
    .meeting-motion-row:hover { background: #f5f6f9; }
    .meeting-motion-row:hover .meeting-motion-arrow { opacity: 1; }
    .meeting-motion-arrow { font-size: .8rem; color: #1a2e6e; opacity: 0; transition: opacity .1s; margin-left: auto; flex-shrink: 0; }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      body { overflow: auto }

      .filters {
        flex-wrap: wrap;
        padding: .6rem 1rem;
        gap: .5rem;
      }
      .filters input  { flex: 1 1 100% }
      .filters select { flex: 1 1 calc(50% - .25rem) }

      .workspace {
        flex-direction: column;
        overflow: visible;
        flex: none;
      }

      .list-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        overflow-y: visible;
      }

      .detail-panel {
        padding: 0;
        background: #fff;
        overflow-y: visible;
      }

      /* Hide/show panels via JS-toggled classes */
      .list-panel.mobile-hidden  { display: none }
      .detail-panel.mobile-hidden { display: none }

      .back-btn { display: flex }

      .detail-content {
        padding: 1rem;
        max-width: 100%;
      }

      .detail-title { font-size: 1.2rem }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="#" class="logo">Decisions Database</a>
  </header>

  <div class="disclaimer-bar">
    For informational purposes only &mdash; may contain inaccuracies. This is not an official or legal record of meetings. Refer to the minutes linked next to each meeting heading for the authoritative record.
  </div>

  <div class="filters" id="filtersBar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search decisions…">
      <button id="searchClear" class="search-clear" aria-label="Clear search">×</button>
    </div>
    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="Motion">Motions</option>
      <option value="Appointment">Appointments</option>
    </select>
    <select id="statusFilter">
      <option value="">All Outcomes</option>
      <option value="Passed">Passed</option>
      <option value="Failed">Failed</option>
      <option value="Withdrawn">Withdrawn</option>
      <option value="Lapsed">Lapsed</option>
    </select>
  </div>

  <div class="workspace">
    <div class="list-panel" id="listPanel"></div>
    <div class="detail-panel mobile-hidden" id="detailPanel">
      <button class="back-btn" id="backBtn">← All decisions</button>
      <div id="detailBody">
        <div class="detail-empty">Select a meeting or decision to view details</div>
      </div>
    </div>
  </div>


  <script type="module" src="/src/main.js"></script>
</body>
</html>
