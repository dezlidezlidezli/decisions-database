<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ANUSA Decisions Database</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .site-header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00663e;
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    /* ── Filters bar ── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: .6rem 1.5rem;
      display: flex;
      gap: .75rem;
      flex-shrink: 0;
    }
    .filters input,
    .filters select {
      padding: .45rem .7rem;
      font-size: .875rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      color: #333;
      outline: none;
    }
    .filters input { flex: 2 }
    .filters select { flex: 1 }
    .filters input:focus,
    .filters select:focus { border-color: #00663e; background: #fff }

    /* ── Split layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: list ── */
    .list-panel {
      width: 380px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      background: #fff;
    }

    .meeting-group { }
    .meeting-heading {
      position: sticky;
      top: 0;
      background: #f4f5f7;
      border-bottom: 1px solid #e0e0e0;
      border-top: 1px solid #e0e0e0;
      padding: .4rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .decision-row {
      padding: .8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      align-items: flex-start;
      gap: .75rem;
    }
    .decision-row:hover { background: #f0f7f4 }
    .decision-row { border-left: 3px solid transparent }
    .decision-row.active { background: #e6f4ed; border-left: 3px solid #00663e }

    .row-id {
      font-size: .7rem;
      color: #999;
      font-weight: 600;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 60px;
    }
    .row-body { flex: 1; min-width: 0 }
    .row-title {
      font-size: .9rem;
      font-weight: 600;
      color: #00663e;
      line-height: 1.3;
      margin-bottom: .25rem;
    }
    .row-meta {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .15em .5em;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 600;
    }
    .badge-type {
      background: #eef2ff;
      color: #3730a3;
    }
    .badge-passed {
      background: #dcfce7;
      color: #166534;
    }
    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }
    .badge-friendly {
      background: #e0f8e9;
      color: #047a37;
    }
    .badge-unfriendly {
      background: #fde0e0;
      color: #a30e0e;
    }

    /* ── Right panel: detail ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2.5rem;
      background: #f4f5f7;
    }

    .detail-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
    }

    .detail-content { max-width: 720px }

    .detail-header {
      margin-bottom: 1.5rem;
    }
    .detail-id {
      font-size: .8rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .detail-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00663e;
      line-height: 1.25;
      margin-bottom: .75rem;
    }
    .detail-badges { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: .5rem 1.5rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .meta-item { }
    .meta-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #999;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .meta-value { font-size: .9rem; color: #333 }

    .detail-section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .detail-section-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #999;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    .detail-preamble {
      font-size: .9rem;
      color: #555;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .detail-preamble p { margin-bottom: .75rem }
    .detail-preamble p:last-child { margin-bottom: 0 }

    .full-text-list {
      list-style: decimal;
      padding-left: 1.25rem;
    }
    .full-text-list li {
      font-size: .9rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: .5rem;
    }
    .full-text-list li:last-child { margin-bottom: 0 }

    .amendments-list { list-style: none }
    .amendment-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: .875rem;
    }
    .amendment-item:last-child { border-bottom: none }
    .amendment-text { flex: 1; color: #444 }
    .amendment-result {
      font-weight: 700;
      font-size: .8rem;
    }
    .amendment-result.passed { color: #166534 }
    .amendment-result.failed { color: #991b1b }

    /* ── Disclaimer modal ── */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-content {
      background: #fff;
      border-radius: 10px;
      padding: 1.75rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .modal-content h2 { font-size: 1.2rem; color: #00663e; margin-bottom: .75rem }
    .modal-content p { font-size: .9rem; color: #555; line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap }
    .close-btn {
      position: absolute; top: .75rem; right: 1rem;
      font-size: 1.4rem; font-weight: bold; color: #aaa; cursor: pointer;
    }
    .close-btn:hover { color: #333 }
    .btn-primary {
      background: #00663e; color: #fff;
      border: none; border-radius: 6px;
      padding: .5rem 1rem; font-size: .9rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #004f2f }

    /* ── Empty state ── */
    .no-results {
      padding: 2rem 1rem;
      text-align: center;
      color: #aaa;
      font-size: .9rem;
    }

    /* ── Back button (mobile only) ── */
    .back-btn {
      display: none;
      align-items: center;
      gap: .4rem;
      background: none;
      border: none;
      color: #00663e;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      padding: .75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
      width: 100%;
      text-align: left;
    }
    .back-btn:hover { background: #f0f7f4 }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      body { overflow: auto }

      .filters {
        flex-wrap: wrap;
        padding: .6rem 1rem;
        gap: .5rem;
      }
      .filters input  { flex: 1 1 100% }
      .filters select { flex: 1 1 calc(50% - .25rem) }

      .workspace {
        flex-direction: column;
        overflow: visible;
        flex: none;
      }

      .list-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        overflow-y: visible;
      }

      .detail-panel {
        padding: 0;
        background: #fff;
        overflow-y: visible;
      }

      /* Hide/show panels via JS-toggled classes */
      .list-panel.mobile-hidden  { display: none }
      .detail-panel.mobile-hidden { display: none }

      .back-btn { display: flex }

      .detail-content {
        padding: 1rem;
        max-width: 100%;
      }

      .detail-title { font-size: 1.2rem }
    }
  </style>
</head>
<body data-disclaimer="This is an unofficial early beta version of a Decisions Database for ANUSA SRC decisions, containing limited data from 2025's SRC1. It is a proof-of-concept only and may contain some inaccuracies.">

  <header class="site-header">
    <a href="#" class="logo">ANUSA Tracker</a>
  </header>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="Search decisions…">
    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="Motion">Motions</option>
      <option value="Procedural">Procedurals</option>
      <option value="Appointment">Appointments</option>
    </select>
    <select id="statusFilter">
      <option value="">All Outcomes</option>
      <option value="Passed">Passed</option>
      <option value="Failed">Failed</option>
    </select>
  </div>

  <div class="workspace">
    <div class="list-panel" id="listPanel"></div>
    <div class="detail-panel mobile-hidden" id="detailPanel">
      <button class="back-btn" id="backBtn">&#8592; All decisions</button>
      <div id="detailBody">
        <div class="detail-empty">Select a decision to view details</div>
      </div>
    </div>
  </div>

  <!-- Disclaimer modal -->
  <div id="readOnlyDisclaimerModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="roDisclaimerTitle">
      <span id="roDisclaimerClose" class="close-btn" aria-label="Close">&times;</span>
      <h2 id="roDisclaimerTitle">Site disclaimer</h2>
      <p id="roDisclaimerText"></p>
      <button id="roDisclaimerOk" class="btn-primary">I understand</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
