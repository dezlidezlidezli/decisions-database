These findings echo those of the ANUSA BIPOC Department’s fourth Racism Report, released in October 2025, which revealed that students report racism in academic, residential and social settings. The most recent Racism Report builds on the three prior editions, which document a long history of racism and inaction at the ANU. The ANUSA BIPOC Department notes that students often rely on informal networks or student representatives to navigate reporting and disclosure processes and to obtain support, due to uncertainty surrounding available options. It is imperative that the ANU publicly responds to the recommendations from the Racism@Uni study and the Racism Report, and publicly tracks their implementation, in order to minimize the burden on BIPOC students.

The Racism@Uni study emphasises the Racism Report’s call for the ANU to adopt clear, transparent and measurable approaches to addressing racism. At present, the ANU has not released a publicly available response to either report, or outlined a timeline or framework for implementing their recommendations. It is essential that ANUSA continues to proactively advocate for the ANU’s implementation of specific, actionable steps towards improving safety, accountability and institutional transparency.`,fullText:`1. ANUSA calls on the ANU to publicly acknowledge the findings of both the national Racism@Uni study, and the BIPOC Department’s fourth racism report.
2. ANUSA calls on the ANU to fully implement the national study’s recommendations, including transparent and public reporting, improving demographic data collection, and meaningful accountability mechanisms.
3. ANUSA calls on the ANU to publicly release regular progress updates about the implementation of recommendations contained in the Racism@Uni report and BIPOC Department’s fourth racism report.
4. ANUSA calls on the ANU to engage directly with BIPOC students and staff in co-designing anti-racism strategies that are not symbolic, but structural and enforceable.`,mover:"Anenya Kale",seconder:"Tom Hughes",minutesPage:20,type:"Motion",status:"Passed",amendments:[]},Ut=Object.freeze(Object.defineProperty({__proto__:null,default:Nt},Symbol.toStringTag,{value:"Module"})),_t={id:"7.4",title:"ANUSA endorses the Refugee Action Campaign Protest",preamble:`The Refugee Action Campaign Palm Sunday protest ‘Refugees and Migrants Welcome Here’ is an annual protest supporting refugees and asylum seekers both in Australia and trying to seek asylum here.The protest is occurring on the 29th of March 2026 at 1pm in Civic Square.

Australia has mistreated and detained refugees for decades, drawing widespread international criticisms for our inhumane policies and offshore detention system. In light of the rise of islamophobia and racist rhetoric around migrants in Australia, including statements by Senator Pauline Hanson stating that ‘there are no good Muslims’, it is more important than ever to show support for migrants and refugees. It is also important to remember that Australia is built off migration, and the diversity of experience and culture has played a vital role in shaping the country we know today. Refugees and migrants ARE welcome in Australia, and we will continue to fight to ensure that is the case.`,fullText:`1. ANUSA endorses the RAC protest.
2. ANUSA encourages every member of the SRC to attend the protest and show support for refugees in Australia and seeking asylum in Australia.
3. ANUSA encourages the President to repost the RAC Protest post on the ANUSA Instagram and Facebook to show support for the protest.
4. ANUSA condemns the Labor, Liberal and One Nation parties for their role in promoting an anti-refugee political terrain through draconian refugee policy and political rhetoric.`,originalText:`1. ANUSA endorses the RAC protest.
2. ANUSA encourages every member of the SRC to attend the protest and show support for refugees in Australia and seeking asylum in Australia.
3. ANUSA encourages the President to repost the RAC Protest post on the ANUSA Instagram and Facebook to show support for the protest.`,mover:"Leila Clarke",seconder:"Anenya Kale",minutesPage:22,type:"Motion",status:"Passed",amendments:[{text:"Add point 4 condemning the Labor party",fullText:"1. Add action point 4 that reads “ANUSA condemns the Labor party for its role in setting an anti-refugee political terrain through draconian refugee policy and political rhetoric.”",mover:"Clara",seconder:"Tasmyn",passed:!1,friendly:!1},{text:"Add point 4 condemning the Labor, Liberal and One Nation parties",fullText:"1. Add action point 4 that reads “ANUSA condemns the Labor, Liberal and One Nation parties for their role in promoting an anti-refugee political terrain through draconian refugee policy and political rhetoric”",mover:"Leila Clarke",seconder:"Tom Hughes",passed:!0,friendly:!1}]},Tt=Object.freeze(Object.defineProperty({__proto__:null,default:_t},Symbol.toStringTag,{value:"Module"})),Ct={id:"7.5",title:"The ANU must step up and protect victim-survivors of domestic violence",preamble:`*Content warning: Mentions of domestic violence, femicide, and misogyny.*

Domestic violence (DV) and Gender-based violence (GBV) remain the largest impediments to women’s lives. Over the past two years, 184 women in Australia have been murdered by their domestic partners or by someone they know. In 2026 alone (as of today), 12 women have been killed and 1 in 4 women in Australia remain victim-survivors of DV and GBV. Without a doubt, there is a current crisis of femicide in Australia and worldwide. We have known this for a while, and so have our politicians and persons in power.

As one of the largest universities in Australia, it is vital for the ANU to recognize the detriment DV has and take proactive steps to support victim-survivors. However, there is currently little discussion and a lack of measures taken around DV at the ANU. To rectify this, the ANU must take action to ensure that DV does not occur on campus and prevent its students from suffering such abuse, rather than rely on words without promise. It is crucial that the ANU places the wellbeing and safety of their students first and foremost, whether this is emotional or financial support and assistance. This includes waiving accommodation fees for students escaping from DV.

Thousands of victim-survivors are prevented from escaping DV due to financial and societal strain. They are denied the bare minimum: the ability to escape hardship and violence. As a university that receives a large intake of inter-state and international students, the ANU must consider that the purpose of relocation for some students is to escape DV. Thus, it is fundamental for the ANU to implement strong and effective policies to accommodate and assist students in their relocation.`,fullText:`1. To call on the ANU as a part of their duty of care to students and role in triaging support for those living on campus to introduce immediate relocation assistance for victim-survivors, and to work with local services (YWCA, Beryl Women Inc, etc.) to provide emergency accommodation for students.
2. To call on the ANU to provide an accommodation scholarship for student victim-survivors of Domestic Violence on university accommodation residences experiencing financial hardship. This scholarship would be facilitated by a case manager following disclosure and funded by the ANU.
3. To call on the ANU to improve disclosure support systems and case management for better accessibility and tailored to students experiencing DV. This includes connecting students to specialised DV support and assistant services, such as ANUSA Lawyers and other internal mental health and physical health support services.
4. To call on the ANU to provide training on matters relating to DV to staff, student leaders and implement Rights, Relationships and Respect (RRR) education for all students that includes discussion of DV, gender-based power dynamics, and signs of GBV in relationships.`,mover:"Liv Yu",seconder:"Katie",minutesPage:25,type:"Motion",status:"Passed",amendments:[]},Pt=Object.freeze(Object.defineProperty({__proto__:null,default:Ct},Symbol.toStringTag,{value:"Module"})),Rt={id:"7.6",title:"Dysfunction on Campus",preamble:`On-campus events organised by student societies and residential halls alike are an essential part of student life at ANU. Overwhelmingly, these events are planned not by university staff, but by a relatively small group of dedicated and passionate students who take the initiative to contribute to our campus culture. However, for far too long these students have consistently faced unreasonable and overtly obstructionist behaviour from ANU management when attempting to plan events, especially with regard to booking spaces on campus. This includes societies being hit with cleaning fees of up to $200 before a scheduled event takes place, inconsistent booking practices which severely inconvenience club executives, attempted censorship of club events, and generally poor experiences from club executives thereof. This behaviour from Functions on Campus, Kambri Venues, and ANU Security is not good enough. Clubs form the backbone of our campus culture at ANU, which is itself an important part of maintaining the mental health and wellbeing of students, especially those who live on campus. The new regulations around bookings are also being used to curtail political and cultural expression and freedom of speech on campus, especially as it pertains to booking meetings, information stalls, and potentially organising protest events. This affects not just the social life of campus, but the ability to fight for causes students support, through events held by clubs as well as parts of ANUSA itself, including departments.

As a student union, we should fight to protect and nurture the one-of-a-kind student experience we enjoy at ANU. Our student societies should be encouraged by the university to add to student life at ANU, rather than being prevented from doing so.`,fullText:`1. Condemn Functions on Campus, Kambri Venues, and ANU Security for their unfair, unreasonable and inconsistent treatment of clubs, especially with regard to the charging preemptive cleaning fees to clubs holding events on campus, and restrictions on the freedom of expression of students.
2. Call on FOC and Kambri to provide a written response to the uptick in cleaning fees and inconsistent application of their own policy.`,mover:"Tessa McNamara",seconder:"Chris Morris",minutesPage:26,type:"Motion",status:"Passed",amendments:[]},Et=Object.freeze(Object.defineProperty({__proto__:null,default:Rt},Symbol.toStringTag,{value:"Module"})),jt={id:"7.7",title:"Condemning Subclass 485 Visa Fee Increase",preamble:`On 1 March 2026, the Australian Federal Government doubled the Subclass 485 Temporary Graduate visa fee from $2,300 to $4,600, with one day's notice, no transition period, and no public justification. This is part of a broader pattern of escalating costs imposed on international students, and has left Australia with the highest post-study work visa fee among comparable destinations by a wide margin.

We understand that visas carry costs and that migration systems must be administered responsibly. But there is a meaningful difference between costs and exploitation. We did not force our way into this country, Australia recruited us, through marketing, through scholarships, through the promise of post-study pathways. It is therefore deeply troubling that we are so often treated as though we forced our way in, as though our presence here is a concession rather than something this country actively sought and makes a great amount of money from. We made long-term financial decisions based on the settings that existed when we arrived. Doubling fees overnight, for people already here, already committed, already deep into a path this country invited us onto, is a profound breach of that trust. When the UK changed the cost of its Graduate Route, it gave fourteen months' notice. Australia gave us one day. What this pattern makes clear is that international students are and have always been mere cash cows, not community members, not contributors, but a reliable source of revenue to tap whenever the budget needs padding.

ANU is a leading Group of Eight university with easy access to the government and policymakers. That position carries responsibility. ISD has already spoken, we’ve released a statement, we’ve also, along with ANUSA, written to the Minister of Home Affairs & Citizenship, now ANU must use its influence to do the same.

[ANU ISD’s Statement on the Subclass 485 Visa Fee Increase](https://docs.google.com/document/d/15tnS2rjKZQBMVDrB-nvYWf0Uxc0A-pcWPWBgJ2_IknI/edit?usp=sharing)`,fullText:`1. The SRC opposes the Subclass 485 visa fee increase and calls on the Australian Federal Government to reverse the decision.
2. The SRC endorses ISD's statement on the fee increase and affirms that international students are valued contributors and community members, not a budget line.
3. The SRC calls on ANU to publicly and forcefully advocate to the Federal Government for the reversal of this fee increase, in line with the asks set out in ISD's statement.`,mover:"Anuva Rai",seconder:"Charley Ellwood",minutesPage:28,type:"Motion",status:"Passed",amendments:[]},$t=Object.freeze(Object.defineProperty({__proto__:null,default:jt},Symbol.toStringTag,{value:"Module"})),It={id:"7.8",title:"ANUSA stands with the ANU Governance Project",preamble:`During the horrors of RenewANU, a group of academics from across the university came together and recognised that the issues facing the ANU were not just financial but were deeply rooted in a failing governance system that does not adequately represent or support our community. Over many months, these academics would speak with staff and students from across the university and listen to how the university was failing in many areas.

What resulted was a lengthy and comprehensive report that was a scathing analysis on the failures of university governance and a roadmap of how to fix it – [Link to report here](https://www.anugovernance.org/finalreport.pdf). In this report is a culmination of the voices of dozens of staff and students, includes comparative research, and has ambitious but very achievable goals for the university. The governance project has made representations to the Senate, spoken with politicians from all sides of politics, and has presented at the ANU Council Planning Day.

Whilst RenewANU is, for the most part, over, staff are still hurting and it’s clear that the university is still suffering. The governance project is continuing their work this year and have set up a number of smaller project groups looking at a range of their recommendations including the establishment of an Academic Senate, immediate reforms to academic board, and wider external stakeholder engagement.

The ANU Governance Project is a fantastic example of a community led campaign and it is imperative that our beloved ANU Staff receive their full support from the student union.`,fullText:`1. ANUSA will always stand with staff at the university and will fight with them against cuts to education.
2. ANUSA supports the work of the ANU Governance Project and commits to being an active source of student voice for the project.
3. ANUSA recognises that governance reform is an essential part of reforming our higher education sector.
4. ANUSA encourages students on the SRC and EDC to reach out to the ANUSA President if they would like to be involved in the project`,mover:"Charley Ellwood",seconder:"Aurora Neumann",minutesPage:30,type:"Motion",status:"Passed",amendments:[]},Mt=Object.freeze(Object.defineProperty({__proto__:null,default:It},Symbol.toStringTag,{value:"Module"})),Ot={id:"7.9",title:"Clubs Affiliation",preamble:`The following is the list of clubs approved for affiliation:

- ANU Association for Defence & Security Studies
- ANU Taylor Swift Society
- ANU Hong Kong Students Association
- Effective Altruism ANU
- ANU School of Art Collective
- ANU European Studies Association`,fullText:"1. The SRC approves the list of clubs in this motion’s preamble for affiliation with ANUSA.",mover:"Dylan Rafel Adams",seconder:"Charley Ellwood",minutesPage:31,type:"Motion",status:"Passed",amendments:[]},Lt=Object.freeze(Object.defineProperty({__proto__:null,default:Ot},Symbol.toStringTag,{value:"Module"})),zt={name:"SRC 2, 2026",date:"2026-03-25",location:"Marie Reay 5.02 and Zoom",duration:"6:15 pm – 8:50 pm",minutesUrl:"https://anusa.com.au/wp-content/uploads/2026/04/Minutes-ANUSA-SRC-2-2026-1.pdf"},xe=Object.freeze(Object.defineProperty({__proto__:null,default:zt},Symbol.toStringTag,{value:"Module"})),qt={id:"7.1",title:"Fair Graduations for All",preamble:`Graduations are a significant moment, and should be cause for celebration. Everyone should be able to attend their graduation ceremony, regardless of financial circumstance, residency status, or the timing of their completion. International students can pay over $200k for their degree, and domestic students over $55k for a Bachelor of Arts. In non-financial terms, graduations are the culmination of years of blood, sweat and tears.

In August 2024, ANU announced the cancellation of December 2024 graduation ceremonies, and a shift to just one ceremony per year. This was met by broad backlash, with students noting the proposed timing would require all international students to secure a new visa, and would overlap with medical internships and similar for other students ([https://www.canberratimes.com.au/story/8731444/anu-faces-backlash-for-shift-to-single-ann](https://www.canberratimes.com.au/story/8731444/anu-faces-backlash-for-shift-to-single-annual-graduation/) [ual-graduation/](https://www.canberratimes.com.au/story/8731444/anu-faces-backlash-for-shift-to-single-annual-graduation/)). Just one day after a Canberra Times article exposing the student backlash, including a petition with 2000 signatures, the ANU revised the April date to February ([https://www.canberratimes.com.au/story/8736623/anu-responds-to-backlash-over-graduatio](https://www.canberratimes.com.au/story/8736623/anu-responds-to-backlash-over-graduation-ceremony-changes/) [n-ceremony-changes/](https://www.canberratimes.com.au/story/8736623/anu-responds-to-backlash-over-graduation-ceremony-changes/)). While improved, this arrangement still left some students in a visa lurch, and others with already-booked flights and accommodation for family to visit in December and attend the ceremony. This saga demonstrates the need for student consultation in graduation arrangements, including scheduling.

Documents released under Freedom of Information ([https://drive.google.com/drive/folders/1ShUH-Iahf6NHY7MbSwIKdIQXDNT0jMiO?usp=shari](https://drive.google.com/drive/folders/1ShUH-Iahf6NHY7MbSwIKdIQXDNT0jMiO?usp=sharing) ng) reveal that ANU has begun investigating options to restore biannual graduation ceremonies. This is a hard-fought win, following years of student advocacy. However, these discussions with their graduations contractor (GFP) have occurred without student consultation on potential dates for future years, regrettably leaving the door open to continued adverse outcomes.

Furthermore, in 2026 for the first time, graduates were unable to register for a ceremony without either purchasing ($195) or hiring ($94) regalia. In previous years, graduates were able to use graduation gowns purchased second-hand or borrowed from friends. Comments left on social media remarked ‘it’s too expensive’, and ‘the contractor changed this year, it used to work fine’. ANUSA received a significant volume of feedback. This policy created unreasonable and unnecessary financial burden, and created unnecessary waste of extra gowns purchased. It was also poorly-communicated, with conflicting information on the ANU’s website, leaving students in the lurch. Even today, information remains on the ANU’s website explicitly leaving the door open to third-party regalia: “if your regalia is from an alternate source” ([https://www.anu.edu.au/students/graduation/academic-regalia](https://www.anu.edu.au/students/graduation/academic-regalia)).

Documents from the same FOI request now reveal that the ANU:

1. During the tender process for graduations, requested the contractual term requiring all graduating students to source regalia exclusively through the University's appointed provider;
2. When the contracted provider itself offered a compromise allowing students to bring their own gowns for inspection and approval, ANU management explicitly rejected this solution and directed GFP to "hold the line" with no exceptions; and
3. Misrepresented this policy to ANUSA Representatives as entirely outside the University's control.

This is unacceptable. We deserve better.`,fullText:`1. The SRC:
   a. Supports the restoration of biannual graduation ceremonies;
   b. Supports students being able to bring their own regalia for inspection and approval; and
   c. Opposes any graduation policy that creates a financial barrier to a student's ability to attend and fully participate in their own graduation ceremony.
2. The SRC calls on the ANU to:
   a. Conduct early and ongoing student consultation through ANUSA on all matters affecting graduation arrangements before any contractual commitments are made;
   b. Provide a transparent public timeline for changes to graduation ceremonies, including when final dates can be expected to be published;
   c. Amend graduation regalia policy to allow students to wear their own gowns, including second-hand, borrowed, pre-purchased, and culturally significant attire, subject to a reasonable dress standard; and
   d. Ensure that any future changes to graduations are communicated clearly and with sufficient notice to allow students and their families to plan accordingly.`,mover:"Malakai King",seconder:"Anuva Rai",minutesPage:14,type:"Motion",status:"Passed",amendments:[]},Dt=Object.freeze(Object.defineProperty({__proto__:null,default:qt},Symbol.toStringTag,{value:"Module"})),Bt={id:"7.10",title:"Yukeembruk Space",preamble:`Many years ago, ANUSA set out to establish a union-run NightCafe on campus. As many would know - starting a hospitality business is incredibly difficult and unfortunately the NightCafe never came into fruition. In 2023, ANUSA received an underspend bid to fund this project which is tied funding that could only be spent on 'Student Commercial Spaces'. This funding was committed on a 3-year basis and must be spent by the end of 2026. Any money not spent must be returned to the university.

With this dilemma, ANUSA was approached by the Residential Experience Division towards the end of last year to ask whether we would consider supporting the establishment of a space at Yukeembruk which would be student-run and include both a café and several vending machines. This was inspired by the several already successful student cafes/bars across campus and the success of the vending machine café at UNSW.

Over the past 4 months, we have been in extensive negotiations with RED to set up a sponsorship agreement that would return benefits to ANUSA long after the funding would need to be returned to the university. As mentioned in the Presidents Report, the sponsorship amount is $100,000 with a portion paid now (80%) and a portion paid once the project is completed (20%) which must be at the end of 2026. The full list of sponsorship benefits included in the agreement are attached below:

● Benefit 1 – ANUSA Branding Prior to opening of the refurbished Student Community Space which shall be no later than EOY 2026, ANU shall allow ANUSA to supply and install ANUSA branding decals at a prominent location on entry to the Student Community Space in a form approved by ANU and supplied by ANUSA of no less than 50 cm diameter and to include the words ‘proudly sponsored by ANUSA’.
● Benefit 2 – ANUSA Co-branding on Space Name. ANU shall name the space in consultation with Yukeembruk residents and staff and shall display that name in lettering at the Student Community space entry.
● Benefit 3 – Branding and inclusion of vending machines: The ANU shall ensure the prompt installation of no less than three vending machines in the Student Community Space and shall install, at the cost of the operator, ANUSA brand wrapping on those machines in a form approved by ANU and ANUSA and/or sponsorship details in the bulkhead space above the vending machines.
● Benefit 4 – Revenue from vending machines: At the end of each month, Vending Machine Operator will pay to ANUSA a commission, equivalent to 30 cents on every sale of products from vending machines installed in the Student Community Space. The operator will provide ANUSA with an itemized statement of sales from those vending machines for that quarter. ANU will ensure that ANUSA is a party to any contract it enters into with the Vending Machine Operator for the purpose of enforcing its rights to Benefit 4.
● Benefit 5 – Free Venue Use and Access: ANUSA will be able to book and use the Student Community Space, for ANUSA events at no cost on reasonable notice to ANU. ANUSA may also book the Yukeembruk Village Hall, with reasonable notice, at no cost for an annual event. The waiving of fees, extends to facility use only and does not include catering, cleaning etc of the space.
● Benefit 6 – Display Space: ANUSA will be entitled during the Sponsorship Period to establish and maintain a display space in the Student Community Space providing information relevant to student and about ANUSA services at a display table or display stand (such as booklets, pamphlets, flyers and free ANUSA merchandise).

Given the fact that this funding was set to expire and to be returned to the university having achieved nothing for the union, this is a great outcome that will return exposure and revenue for ANUSA. This is not an enormous amount of money but is another form of non-SSAF revenue for the union which is an important part of our financial independence. As it stands, this revenue will go directly to funding the Union Pantry.`,fullText:`1. The SRC supports the sponsorship of the Yukeembruk Student Space as outlined.
2. The SRC encourages ANUSA to explore non-SSAF income sources as an important revenue base for the financial independence of the union.
3. The SRC encourages students to utilise the new Yukeembruk Space once opened.`,mover:"Charley Ellwood",seconder:"Aurora Neumann",minutesPage:26,type:"Motion",status:"Passed",amendments:[]},Ht=Object.freeze(Object.defineProperty({__proto__:null,default:Bt},Symbol.toStringTag,{value:"Module"})),Ft={id:"7.11",title:"Urgent Measures to Alleviate Impacts of the Fuel Crisis",preamble:"Preamble to be provided at the meeting.",fullText:`1. ANUSA endorses the enclosed petition and its proposals: ([https://docs.google.com/forms/d/e/1FAIpQLSfzoEgej3Gr0vk7bJvLtmiv5N-esdtxYhTy](https://docs.google.com/forms/d/e/1FAIpQLSfzoEgej3Gr0vk7bJvLtmiv5N-esdtxYhTyo87Ajh3xLoJoyA/viewform?usp=sharing&ouid=103179480561921004791) [o87Ajh3xLoJoyA/viewform?usp=sharing&ouid=103179480561921004791](https://docs.google.com/forms/d/e/1FAIpQLSfzoEgej3Gr0vk7bJvLtmiv5N-esdtxYhTyo87Ajh3xLoJoyA/viewform?usp=sharing&ouid=103179480561921004791))
2. ANUSA will consider measures (grants, subsidies) that may help to alleviate the impacts of the fuel crisis on the student body`,mover:"Will Roche",seconder:"Motion lapses as mover not present and no other attendee took up right to move the motion.",minutesPage:28,type:"Motion",status:"Lapsed",amendments:[]},Wt=Object.freeze(Object.defineProperty({__proto__:null,default:Ft},Symbol.toStringTag,{value:"Module"})),Gt={id:"7.12",title:"Clubs Affiliation",preamble:`The following is the list of clubs approved for affiliation since the last SRC:

- ANU UN Youth Society
- ANU Research Seminar Association`,fullText:"1. The SRC approves the list of clubs in this motion’s preamble for affiliation with ANUSA.",mover:"Dylan Rafel Adams",seconder:"Lea Fallen",minutesPage:28,type:"Motion",status:"Passed",amendments:[]},Vt=Object.freeze(Object.defineProperty({__proto__:null,default:Gt},Symbol.toStringTag,{value:"Module"})),Jt={id:"7.2",title:"Activating Joplin Lane as a Night-Time Student Precinct",preamble:`Joplin Lane sits at the centre of the ANU campus within the Kambri precinct. As part of the broader Kambri redevelopment and being one of the most heavily trafficked pedestrian corridors on campus, it was designed as a vibrant social and commercial hub, drawing on Melbourne’s laneway culture to support hospitality, events, and active nightlife. University materials describe it as a people-centred public space suited to markets, street festivals and regular live programming, with “[m]usic gigs and pop-up shows every week.” In design and intent, the laneway is positioned as a central site of student activity and engagement.

However, this vision is not being realised in practice. Despite its central location and built capacity for activation, Joplin Lane is underutilised, particularly in the evening. Vacant or inactive tenancies, early venue closures and limited programming reduce its ability to sustain a night-time economy. A space designed for community and interaction instead functions primarily as a transitional corridor, with too little activity and too few reasons for students to stop and stay. This is compounded by physical factors including dim lighting, limited colour and minimal atmospheric activation.

This gap reflects not a failure of design, but of activation. The infrastructure, location and institutional intent required to support a vibrant precinct are already in place, but are not being operationalised in a sustained or coordinated way. Activation remains ad hoc and externally driven, rather than consistent, visible and accessible to students. This represents a missed opportunity to strengthen campus life and student wellbeing. Recent work by the ANUSA Clubs Officer to make the on-campus arcade, Game On, available for student-booked musical performances demonstrates a clear commitment to activating student space in a practical, accessible way. This motion seeks to build upon that ongoing work as part of broader efforts to revitalise Joplin Lane and the broader Kambri precinct.`,fullText:`1. ANUSA calls on the ANU to develop and implement a coordinated plan to activate Joplin Lane as a vibrant evening social space, including:
   a. improvements to lighting to enhance safety and night-time usability;
   b. enhanced atmosphere and visual appeal, including colour, seating, and rotating student-led works (e.g. art displays, pop-up events, and temporary installations); and
   c. engagement of student artists and creatives to deliver murals, installations, and other visible student-led works across the laneway.
2. ANUSA calls on the ANU to fill vacant tenancies along Joplin Lane and support a diverse mix of student-oriented vendors, in consultation with ANUSA to ensure these decisions reflect student needs and preferences.
3. ANUSA calls on the ANU to encourage and facilitate extended operating hours for food and hospitality venues within the Kambri precinct.
   a. Establish a clear and ongoing communication protocol between Kambri Precinct Management, food and hospitality venue operators, and ANUSA to provide advance notice of evening programming, enabling vendors to plan for and extend trading hours where appropriate;
4. To complement and reinforce an active evening precinct, ANUSA further calls on the ANU to deliver sustained and visible activation of Joplin Lane, including:
   a. introducing regular and visible programming, including live music, student performances, pop-up stalls, and night markets;
   b. establishing open and accessible pathways for student-led activation, including open calls to student artists, societies, and collectives for regular use of the space; and
   c. supporting a mix of programmed events, including both society-led and non-affiliated events, such as night markets, thrift markets, and community events, to ensure broad and consistent student engagement.`,mover:"Tyne Jones",seconder:"Seamus Giveen",minutesPage:16,type:"Motion",status:"Passed",amendments:[]},Kt=Object.freeze(Object.defineProperty({__proto__:null,default:Jt},Symbol.toStringTag,{value:"Module"})),Qt={id:"7.3",title:"Improving Transparency and Accountability in Extenuating Circumstances Application (ECA) Decisions",preamble:`The current ANU Extenuating Circumstances Application (ECA) system presents to students as a centralised process administered through the Exams Office. However, in practice, individual academic colleges have authority to decide ECA outcomes, with the Exams Office performing a primarily administrative and implementation role.

This creates a disconnect between how students understand the ECA process and how decisions are actually made. Students are directed to a central point of contact that does not hold substantive decision-making power, limiting their ability to seek clarification, challenge outcomes directly, meaningfully engage with decisions that affect their academic progression, or obtain assessment-specific advice when an application is rejected.

As a result, the system risks functioning as a façade of centralisation, obscuring diffuse college-level decision-making and weakening accountability. In practice, this can leave students without clear avenues for follow-up, particularly in complex or course-specific circumstances where generalised advice from the Exams Office is insufficient. When students are already experiencing extenuating circumstances, this lack of accessible recourse exacerbates existing stress and hardship.

Improving transparency around responsibility for decision making, particularly in cases of rejection, is therefore a practical and necessary step toward ensuring procedural fairness, strengthening accountability, and supporting students to navigate the system effectively. Providing students with direct access to relevant college-level contacts would allow for clearer communication, more tailored guidance, and more meaningful engagement with decision-makers.`,fullText:`1. To call on the Exams Office to amend ECA outcome communications, particularly rejection letters, to include a clear and accessible contact point within the relevant academic college.
2. To call on the Exams Office to ensure that this contact is able to provide substantive clarification on decisions and appropriate course- or assessment-specific advice to students.
3. To call on the Exams Office to review ECA communication practices to better reflect the decentralised nature of decision-making and avoid misleading representations of centralisation through the Exams Office.
4. To call on the ANUSA Education Officer and ANUSA Education Committee to pursue these changes with urgency, recognising their particular importance for students as the end-of-semester exam period approaches.`,mover:"Tyne Jones",seconder:"Liv Yu",minutesPage:18,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.3-7.4-7.5"},Zt=Object.freeze(Object.defineProperty({__proto__:null,default:Qt},Symbol.toStringTag,{value:"Module"})),Yt={id:"7.4",title:"Strengthening Post-Incident Counselling Support under the Student Critical Incident Procedure (ANUP_002607)",preamble:`The ANU Student Critical Incident Procedure (ANUP_002607) plays a critical role in supporting students affected by critical incidents that result in significant psychological distress, fear, or harm to a student or group of students and require immediate, coordinated University response beyond routine processes. This may include the death or serious injury of a student, or threats of such; serious threats of violence to students and/or staff; and other traumatic events or major threats, including those arising from natural disasters. Such circumstances demand timely, accessible, and sustained support.

However, under the current procedure, priority counselling for affected students is only guaranteed in the immediate aftermath of a critical incident and for up to two weeks thereafter. This timeframe does not adequately reflect the realities of trauma and recovery. Trauma, grief, and psychological distress are not experienced in linear or time-bound ways. Many students may not be immediately able or willing to engage with counselling support following an incident, due to shock, cultural considerations, personal circumstances, or delayed emotional processing. As a result, a limited two-week priority window risks excluding students at the point when they are most ready to seek support.

Best-practice, trauma-informed approaches emphasise flexibility, sustained access, and continuity of care. Short, inflexible timeframes create barriers to access, undermine recovery, and place additional strain on students already experiencing significant hardship. Furthermore, there is currently insufficient clarity regarding the continuation of care for students whose needs extend beyond the initial period of priority support specified by the procedure. Without proactive facilitation of ongoing care, students may face discontinuity in support at critical stages of recovery.

Accordingly, reform is required to extend priority counselling access following a student critical incident and to embed continuity of care within the University’s critical incident response.`,fullText:`1. To call on the ANU to amend Clause 14(h) of the Student Critical Incident Procedure (ANUP_002607) to extend guaranteed priority counselling access from up to two (2) weeks to up to six (6) weeks following a critical incident.
2. To call on the ANU to require that continuation of care beyond six (6) weeks be proactively reviewed and facilitated where clinically determined necessary, including through appropriate referral pathways or extended counselling support.
3. To call on the University to account for in its policies the non-linear nature of trauma and grief, the prevalence of delayed help-seeking behaviours and the importance of sustained, flexible, and accessible support systems.
4. To call on the ANU Student Critical Response Team and ANU Counselling to ensure that students impacted by critical incidents are clearly informed of their counselling entitlements and pathways for ongoing care.`,mover:"Tyne Jones",seconder:"Liv Yu",minutesPage:19,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.3-7.4-7.5"},Xt=Object.freeze(Object.defineProperty({__proto__:null,default:Yt},Symbol.toStringTag,{value:"Module"})),en={id:"7.5",title:"Trauma-Informed Reform of the Extenuating Circumstances Application (ECA) System",preamble:`The current ANU Extenuating Circumstances Application (ECA) system does not adequately prioritise student wellbeing. As recognised by the ANUSA Student Representative Council in 2026 SRC1, it imposes burdensome documentation requirements on students already experiencing grief, trauma, or significant hardship. These requirements, including detailed personal statements, strict evidentiary standards and inflexible documentation criteria, can be retraumatising, exclusionary and insensitive to the diverse circumstances students face.

Requirements such as surname-matching on documentation or the inclusion of a student’s name on funeral notices fail to reflect the realities of many students’ lived experiences, including cultural differences, non-traditional family structures, and privacy considerations. This includes circumstances where family members have different surnames, where relationships are non-biological (including in same-sex families), or where cultural practices do not align with standard documentation norms. As a result, students may be denied appropriate support, not due to a lack of genuine need, but due to the ANU’s rigidity and failure to adequately support those experiencing extenuating circumstances.

A system intended to support students in times of hardship must instead be grounded in accessibility, flexibility, and trauma-informed practice. Reform is necessary to ensure that students are treated with dignity and that barriers to accessing support for students experiencing extenuating circumstances are removed.

*Note from the minutes: the action points originally advertised on the agenda for this motion were incorrect. They were corrected by a vote of the SRC conducted asynchronously over email; the minutes (and this record) reflect the corrected version.*`,fullText:`1. To call on the ANU to implement trauma-informed reforms to the Extenuating Circumstances Application (ECA) system.
2. To call on the University to remove rigid documentation requirements, including surname-matching and the requirement for a student’s name to appear on funeral notices.
3. To call on the ANU to accept signed statutory declarations as a valid and sufficient form of documentation in cases where conventional evidence is unavailable, inappropriate, or would impose undue emotional or administrative burden on the student.
4. To call on the ANU to simplify personal statement requirements to reduce the emotional burden placed on students to recount distressing experiences.`,mover:"Tyne Jones",seconder:"Liv Yu",minutesPage:20,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.3-7.4-7.5"},tn=Object.freeze(Object.defineProperty({__proto__:null,default:en},Symbol.toStringTag,{value:"Module"})),nn={id:"7.6",title:"Textbook Costs - An Unnecessary Student Expense in the Digital Age",preamble:`Students are facing unprecedented financial pressure. Against the backdrop of a cost of living crisis and rising global fuel prices, the persistent expectation that students purchase expensive physical textbooks represents an outdated and inequitable burden, one that the ANU must take concrete steps to address.

Textbooks are among the most significant semester expenses students face, routinely costing hundreds of dollars for materials used across only one or two semesters. The problem is compounded by publishers regularly releasing new editions, rendering second-hand copies effectively unsellable and trapping students in a cycle of unavoidable expenditure. The removal of Harry Hartog from campus has worsened this further, adding shipping costs on top of already steep retail prices and pushing more students toward piracy, a trend that harms both authors and students' own data security.

The scale of this issue has been examined in James Cook University's Textbook Affordability Project (2024–2025) where it was found that prescribed textbooks for 72 first-year core subjects averaged $119 each, meaning a single first-year student could spend up to $1,000 on textbooks in one year alone, many of which they will not use beyond that course. For Law and STEM students, annual textbook expenditure can approach $1,500.

Existing institutional responses have been inadequate. In one ANU Contracts course with over 400 enrolled students, only three free online copies of the prescribed textbook were made available, a ratio so low as to render the provision functionally meaningless.

In an era where educational content is increasingly digital and accessible, continuing to place this financial burden on students is neither justified nor acceptable. The ANU must take meaningful action to ensure all students can access the basic materials required to complete their studies.`,fullText:`1. To call on ANUSA to work with academic colleges, the University Library, and residential colleges to establish an effective and sustainable textbook exchange program.
2. To call on the ANU to provide free online textbook access equivalent to a minimum of 10% of each subject's cohort size, ensuring students have genuine and equitable access to required course materials.
3. To call on ANUSA to continue actively promoting ANUSA's Textbook Grant Program to the student body to ensure maximum uptake among those who need it most.`,mover:"Suki Waddel",seconder:"Charley Ellwood",minutesPage:22,type:"Motion",status:"Passed",amendments:[]},sn=Object.freeze(Object.defineProperty({__proto__:null,default:nn},Symbol.toStringTag,{value:"Module"})),an={id:"7.7",title:"Executive Misconduct is an Unacceptable Governance Failure",preamble:`Recent reporting on former ANU Vice-Chancellor Genevieve Bell has raised serious allegations of misconduct, including attempts to influence internal processes, alter official records, and breach conflict-of-interest standards. These allegations have resulted in her suspension and consideration of a campus ban. While Professor Bell has since left the role, the issues revealed are not simply about one individual – they expose a governance system that allowed executive power to operate without meaningful scrutiny.

For students, governance failures are not abstract. They shape the quality of our education every day. When executives can act without transparency or accountability, the consequences are felt in course cuts, understaffed teaching, increased workloads, and decisions made behind closed doors that directly undermine the learning environment. The same opaque structures that enabled alleged misconduct also enabled RenewANU, which pushed through restructures that students and staff repeatedly warned would damage educational quality and the community we fight to protect.

Across the higher education sector, corporatised governance has concentrated authority in senior management while sidelining students, staff, and democratic oversight. The allegations against Bell are a symptom of a deeper crisis: a university model that prioritises executive discretion over community accountability.

In 2026, ANUSA reaffirms that accountable, transparent governance is essential to a university that serves its students, staff, and public mission.`,fullText:`1. ANUSA demands that all senior executive appointments, performance reviews, and conflict-of-interest processes be subject to transparent reporting accessible to students and staff.
2. ANUSA reaffirms its commitment to democratising university governance and calls for increased student and staff representation on all major decision-making bodies.
3. ANUSA commits to working with the NUS, the NTEU, and other student unions to campaign for national governance standards that prevent executive misconduct and protect the integrity of public universities.`,mover:"Aurora Neumann",seconder:"Oliver Walsh",minutesPage:23,type:"Motion",status:"Passed",amendments:[]},on=Object.freeze(Object.defineProperty({__proto__:null,default:an},Symbol.toStringTag,{value:"Module"})),rn={id:"7.8",title:"Instituting an ANUSA Boardroom Booking Policy",preamble:`The ANUSA Boardroom is a unique space on campus.

As property of ANUSA, it is exempt from the Functions on Campus requirements for all bookings in ANU spaces. ANUSA has previously recognised that the FoC process is highly burdensome, requiring more than 14 days’ notice of events. Additionally, with fines and ‘cleaning fees’ increasingly levied by the Kambri Precinct Management Team, one would reasonably assume the Boardroom would be consistently booked out by clubs. So why isn’t it? It seems that most clubs simply do not know that the space is bookable to any student of the ANU. This itself stems from a lack of clarity on ANUSA’s policy. Information provided to clubs in 2026 does not indicate that the space is bookable in any capacity.

ANUSA Departments, the Executive and Staff use the Boardroom daily for regular Department Meetings, Executive Meetings and is even used in the hiring of ANUSA staff. For the Environment Department - which does not have a base on campus - the flexibility of the Boardroom is a godsend when coordinating campaigns that have a tight turnaround or are reactive in nature. Currently, the Boardroom’s consistent availability is only due to the fact that clubs merely are unaware of their right to book the room whenever, and however often, as they want.

While ANUSA continues to push for the FoC system to be completely overhauled, it's important that the ability of our union to engage in activism, advocacy and service provision is not undermined. We understand that the FoC system is verging on unworkable for our 140+ affiliated clubs. As a result, this motion seeks to clarify the union’s policy to ensure fairness and the quality of all our work through ANUSA.

It is important not to leave our affiliated clubs out in the cold. Instead, we need to strike a delicate balance. Under the proposed policy, clubs remain able to book the space, but only as a last minute option. With a 48 hour maximum turnaround, we intend to disincentivise clubs from planning events in the Boardroom, leaving it open if plans fall through due to unforeseen circumstances. At the same time, this process ensures that ANUSA staff, departments and officers will have exclusive access to make bookings until 48 hours before the event, ensuring their access is not in doubt.

We believe this proposal strikes the right balance.`,fullText:"1. ANUSA adopts, as policy of the Association, the ‘ANUSA Boardroom Booking Policy’ [Reference P].",mover:"Flynn Wade-Schneiders",seconder:"Malakai King",minutesPage:24,type:"Motion",status:"Passed",amendments:[]},ln=Object.freeze(Object.defineProperty({__proto__:null,default:rn},Symbol.toStringTag,{value:"Module"})),cn={id:"7.9",title:"ANUSA Supports the UC NTEU Staff Strike",preamble:"University of Canberra staff, represented by the NTEU, have voted to strike on the 5th of May following what the union describes as “protracted bargaining negotiations” that failed to resolve key issues around workloads, salaries, and job security. As a student union, ANUSA recognises that staff working conditions directly shape the quality, accessibility, and stability of students’ learning environments across the ACT. When staff face burnout, insecure employment, or unmanageable workloads, students feel the consequences in the classroom and across the sector. Supporting UC staff in their industrial action is therefore part of standing for a fair, well-resourced tertiary education system. ANUSA affirms the right of staff to take protected industrial action and expresses solidarity with the NTEU in their efforts to secure safe workloads, fair pay, and secure jobs for all university workers.",fullText:`1. ANUSA supports UC staff participating in protected industrial action on 5 May.
2. The SRC endorses the ANUSA Education Committee sending a student contingency to the strike.
