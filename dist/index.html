  <title>ANUSA Decisions Database</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .site-header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00663e;
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    /* ── Filters bar ── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: .6rem 1.5rem;
      display: flex;
      gap: .75rem;
      flex-shrink: 0;
    }
    .filters input,
    .filters select {
      padding: .45rem .7rem;
      font-size: .875rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      color: #333;
      outline: none;
    }
    .filters input { flex: 2 }
    .filters select { flex: 1 }
    .filters input:focus,
    .filters select:focus { border-color: #00663e; background: #fff }

    /* ── Split layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: list ── */
    .list-panel {
      width: 380px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      background: #fff;
    }

    .meeting-group { }
    .meeting-heading {
      position: sticky;
      top: 0;
      background: #f4f5f7;
      border-bottom: 1px solid #e0e0e0;
      border-top: 1px solid #e0e0e0;
      padding: .4rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .decision-row {
      padding: .8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      align-items: flex-start;
      gap: .75rem;
    }
    .decision-row:hover { background: #f0f7f4 }
    .decision-row { border-left: 3px solid transparent }
    .decision-row.active { background: #e6f4ed; border-left: 3px solid #00663e }

    .row-id {
      font-size: .7rem;
      color: #999;
      font-weight: 600;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 60px;
    }
    .row-body { flex: 1; min-width: 0 }
    .row-title {
      font-size: .9rem;
      font-weight: 600;
      color: #00663e;
      line-height: 1.3;
      margin-bottom: .25rem;
    }
    .row-meta {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .15em .5em;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 600;
    }
    .badge-type {
      background: #eef2ff;
      color: #3730a3;
    }
    .badge-passed {
      background: #dcfce7;
      color: #166534;
    }
    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }
    .badge-friendly {
      background: #e0f8e9;
      color: #047a37;
    }
    .badge-unfriendly {
      background: #fde0e0;
      color: #a30e0e;
    }

    /* ── Right panel: detail ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2.5rem;
      background: #f4f5f7;
    }

    .detail-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
    }

    .detail-content { max-width: 720px }

    .detail-header {
      margin-bottom: 1.5rem;
    }
    .detail-id {
      font-size: .8rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .detail-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00663e;
      line-height: 1.25;
      margin-bottom: .75rem;
    }
    .detail-badges { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .5rem 1.5rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .meta-item { }
    .meta-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #999;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .meta-value { font-size: .9rem; color: #333 }

    .detail-section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .detail-section-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #999;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    .detail-preamble {
      font-size: .9rem;
      color: #555;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    .detail-preamble p { margin-bottom: .75rem }
    .detail-preamble p:last-child { margin-bottom: 0 }

    .full-text-list {
      list-style: decimal;
      padding-left: 1.25rem;
    }
    .full-text-list li {
      font-size: .9rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: .5rem;
    }
    .full-text-list li:last-child { margin-bottom: 0 }

    .amendments-list { list-style: none }
    .amendment-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: .875rem;
    }
    .amendment-item:last-child { border-bottom: none }
    .amendment-text { flex: 1; color: #444 }
    .amendment-result {
      font-weight: 700;
      font-size: .8rem;
    }
    .amendment-result.passed { color: #166534 }
    .amendment-result.failed { color: #991b1b }

    /* ── Disclaimer modal ── */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-content {
      background: #fff;
      border-radius: 10px;
      padding: 1.75rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .modal-content h2 { font-size: 1.2rem; color: #00663e; margin-bottom: .75rem }
    .modal-content p { font-size: .9rem; color: #555; line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap }
    .close-btn {
      position: absolute; top: .75rem; right: 1rem;
      font-size: 1.4rem; font-weight: bold; color: #aaa; cursor: pointer;
    }
    .close-btn:hover { color: #333 }
    .btn-primary {
      background: #00663e; color: #fff;
      border: none; border-radius: 6px;
      padding: .5rem 1rem; font-size: .9rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #004f2f }

    /* ── Empty state ── */
    .no-results {
      padding: 2rem 1rem;
      text-align: center;
      color: #aaa;
      font-size: .9rem;
    }

    /* ── Back button (mobile only) ── */
    .back-btn {
      display: none;
      align-items: center;
      gap: .4rem;
      background: none;
      border: none;
      color: #00663e;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      padding: .75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
      width: 100%;
      text-align: left;
    }
    .back-btn:hover { background: #f0f7f4 }

    /* ── Narrow detail panel ── */
    @media (max-width: 500px) {
      .detail-meta-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      body { overflow: auto }

      .filters {
        flex-wrap: wrap;
        padding: .6rem 1rem;
        gap: .5rem;
      }
      .filters input  { flex: 1 1 100% }
      .filters select { flex: 1 1 calc(50% - .25rem) }

      .workspace {
        flex-direction: column;
        overflow: visible;
        flex: none;
      }

      .list-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        overflow-y: visible;
      }

      .detail-panel {
        padding: 0;
        background: #fff;
        overflow-y: visible;
      }

      /* Hide/show panels via JS-toggled classes */
      .list-panel.mobile-hidden  { display: none }
      .detail-panel.mobile-hidden { display: none }

      .back-btn { display: flex }

      .detail-content {
        padding: 1rem;
        max-width: 100%;
      }

      .detail-title { font-size: 1.2rem }
    }
  </style>

Our student union has a duty to challenge these attacks on staff and students by university management. Students and staff should not have to ensure the profitability of ANU.`,fullText:`1. The ANUSA SRC stands in solidarity with staff and students as they fight back against the course cuts at ANU.

This is the space that the ANUSA executive is currently trying to rob students of. They are pushing for the collective to be abolished. This would reduce the independence and budget of the Environment officer position.
The proposed changes would remove one of the last spaces that any student at ANU can come to with ideas for campaigns to engage in and be provided with material resources to support these campaigns. It is anti-democratic to abolish this space and to restrict what campaigns the office can run to whatever the executive politically agrees with.
If this was the state of affairs in 2019 there would have been no uni student contingents to the School Strikes in 2019, as the executive at the time didn't support the university contingents to the strikes. It was the environment collective that provided the resources and the platform to promote these student contingents. The uni student contingents were then able to provide an avenue for uni students to engage in the school strikes, and not just ANU students but UC and ACU students as well.
The other argument that the ANUSA executive is waging is that the Environment Collective has been too "political" and has not done enough environmental activism. What this really means is restricting the campaigning of the Collective to environmental activism the executive deems to be politically acceptable. Campaigns around Indigenous land rights, against environmentally destructive wars and for refugee rights as the climate crisis creates millions of refugees are apparently "too political". But the history of environmental activism shows the opposite. The fight for climate justice has always meant taking up all of these issues, and to argue otherwise is not an argument "against politics", but an argument for right wing politics.
The ANU Environment Collective is an important institution on campus that has provided democratic organising spaces for environmentally minded students to campaign against the destruction of our climate and many other connected issues. This institution must be defended.
A testament to the importance of the Environment Collective from Dr Ben Keaney Palaeo-ecologist and ANU alumni: 
"It is important to retain this space for students that are interested in Environmental issues, to have a voice within the students association and more broadly in the ANU community. The awareness of environmental issues fostered by the Environment Collective is a big
difference between the ANU and other universities in Canberra, and has helped shape the careers of generations environmentalists working throughout Australia and the world."`,fullText:`1. The ANUSA SRC affirms the importance of democratic activist spaces within the student union.

Climate change and the climate crisis do not exist in isolation. The situation in 2025 is inextricably linked to industry and capitalism (in many ways including direct emissions), racism and colonialism (in many ways including that communities of people of colour are more likely to be located in areas with heavy pollution and face health consequences).
Climate security cannot be achieved without climate justice, which involves reversing the historically uneven burdens between nations to better reflect their historical emissions and capacity to respond to the climate crisis. Climate justice necessitates solidarity with Indigenous people across the world, whose communities are often hit first and hardest by the climate crisis. Therefore, climate justice also necessitates tangible solidarity with other justice movements, including supporting actions organised by people fighting for those causes. This is not a new concept, but a continuation of ANUSA's long history of supporting causes beyond, but connected to, tertiary education activism (for example, the transgender youth health care rallies in February 2025).
Land back simultaneously acknowledges the violent history of colonialism, and begins to undo the systems that harm Indigenous people and their land. It is impossible to support climate justice in isolation, without supporting land back movements here and around the world, and tangibly standing in solidarity with Indigenous peoples.

MySupport ANU`,fullText:"1. The SRC approves the list of clubs in this motion’s preamble for affiliation with ANUSA.",mover:"Harrison Oates",seconder:"Will Burfoot",type:"Motion",status:"Passed",amendments:[]},B=Object.freeze(Object.defineProperty({__proto__:null,default:M},Symbol.toStringTag,{value:"Module"})),L={id:"2025-SRC1-7.5",meeting:"2025-02-26",title:"Redemption of Mandatory Attendance",summary:"",preamble:`The dire financial situation of the ANU has resulted in the continual withdrawal of the number of tutorials offered, especially in those courses where attendance is mandatory and contributes directly to student grades. As a result, working students are left bereft of flexibility in their timetables and are forced to choose between their absolutely necessary income and their academic performance.

Attending mandatory tutorials, then, is increasingly becoming unrealistic for a majority of the student population, in particular working students who are negatively and disproportionately impacted.

A solution would be following in the path of redeemable exams, by giving students the ability to get the weighting of tutorial participation adjusted through empowering the course convener with the ability to make accessibility accommodations for students. In making mandatory attendance marks redeemable across all relevant Colleges, by adding the grade weight of missed attendance onto different assessment piece's, ANUSA reaffirms its commitment to ensuring the accessibility and opportunity for academic excellence remains open to each and every student. Currently, tutorials are largely unredeemable due to not meeting the 20% weighting threshold demanded by ECAs and limitations in the ECAs scope in supporting working students. Redeemable tutorial scores must be pursued as a form of universal accessibility which gives the flexibility for students to request adjustments from their conveners. Furthermore, redeemable tutorials should by no means be an indication to a university focused on course and staff cuts to reduce the number of tutorials, as seen in other universities such as the University of Adelaide. Therefore, beyond making tutorials redeemable the university should be looking at expanding the number of tutorial sessions offered outside of working hours. Changes such as these empower course conveners and students to achieve the best accommodations in their studies without having to rely on a bureaucratic and exhaustive process in the ECA/access to EAPs.

We call on the SRC to unite in a wide-scale effort across Academic Colleges to push for the implementation of redemptive mandatory attendance.`,fullText:`1. As ANUSA policy, the SRC commits to fully supporting the pursuit of mandatory attendance grades being redeemable across all relevant Colleges through the form of academic accommodations by request of students.

Recently, we found that the ANU was investing over $35 million in projects that break their own emissions rules. In addition to that, ANU's most recent documents show a $32.7 million investment in BHP, one of Australia's biggest producers of coal and the owner of the massive Mount Albert coal mine. They also show a $6.7 million dollar investment in Australia's biggest oil and gas producer, Woodside Energy, which is somehow within the 'Socially Responsible' policy. We say all of those numbers should be ZERO.

Our ANU ZERO campaign demands that the ANU

1. Amend the Socially Responsible Investments Policy to allow ZERO investment in companies that are major producers of oil and gas, and coal, such as BHP and Woodside.
2. Ensure that the ANU makes ZERO new investments that fail to comply with their own emissions reduction targets.

<body data-disclaimer="This is an unofficial early beta version of a Decisions Database for ANUSA SRC decisions, containing limited data from 2025's SRC1. It is a proof-of-concept only and may contain some inaccuracies.">

  <header class="site-header">

      </div>
    </div>
  </div>
