<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ANUSA Decisions Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .site-header {
      background: #1a2e6e;
      border-bottom: none;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .site-header .logo {
      font-family: 'Roboto Slab', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    /* ── Filters bar ── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: .6rem 1.5rem;
      display: flex;
      gap: .75rem;
      flex-shrink: 0;
    }
    .filters input,
    .filters select {
      padding: .45rem .7rem;
      font-size: .875rem;
      font-family: 'Roboto', sans-serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      color: #333;
      outline: none;
    }
    .search-wrap { flex: 2; position: relative; display: flex; align-items: center; }
    .search-wrap input { flex: 1; padding-right: 2rem; }
    .search-clear {
      position: absolute; right: .5rem;
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 1.1rem; line-height: 1;
      padding: 0; display: none;
    }
    .search-clear:hover { color: #555; }
    .search-wrap.has-value .search-clear { display: block; }
    .filters select { flex: 1 }
    .filters input:focus,
    .filters select:focus { border-color: #1a2e6e; background: #fff }

    /* ── Split layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: list ── */
    .list-panel {
      width: 380px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      background: #fff;
    }

    .meeting-group { }
    .meeting-heading {
      position: sticky;
      top: 0;
      background: #f0f2f4;
      border-bottom: 1px solid #dde0e4;
      border-top: 1px solid #dde0e4;
      padding: .55rem 1rem;
      font-size: .82rem;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .15s, color .15s;
    }
    .meeting-heading:hover { background: #e8eaf0; color: #1a2e6e; }
    .meeting-heading:hover .meeting-heading-arrow { opacity: 1; transform: translateX(2px); }
    .meeting-heading.active { background: #e8eaf0; color: #1a2e6e; border-left: 3px solid #1a2e6e; }
    .meeting-heading-arrow { font-size: 1rem; opacity: .4; transition: opacity .15s, transform .15s; }
    .meeting-heading.active .meeting-heading-arrow { opacity: 1; }

    .decision-row {
      padding: .8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      align-items: flex-start;
      gap: .75rem;
    }
    .decision-row:hover { background: #f5f6f9 }
    .decision-row { border-left: 3px solid transparent }
    .decision-row.active { background: #eef0f7; border-left: 3px solid #1a2e6e }

    .row-id {
      font-size: .7rem;
      color: #999;
      font-weight: 600;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 60px;
    }
    .row-body { flex: 1; min-width: 0 }
    .row-title {
      font-size: .9rem;
      font-weight: 600;
      color: #1a2e6e;
      line-height: 1.3;
      margin-bottom: .25rem;
    }
    .row-meta {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .15em .5em;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 600;
    }
    .badge-type {
      background: #eef2ff;
      color: #3730a3;
    }
    .badge-passed {
      background: #dcfce7;
      color: #166534;
    }
    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }
    .badge-friendly {
      background: #e0f8e9;
      color: #047a37;
    }
    .badge-unfriendly {
      background: #fde0e0;
      color: #a30e0e;
    }
    .badge-withdrawn {
      background: #f3f0ff;
      color: #5b21b6;
    }
    .badge-lapsed {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-bloc {
      background: #ebf0ff;
      color: #1e40af;
    }
    .bloc-notice {
      font-size: .82rem;
      color: #1e40af;
      background: #ebf0ff;
      border: 1px solid #c7d7fd;
      border-radius: 6px;
      padding: .5rem .75rem;
      margin-top: .5rem;
      line-height: 1.6;
    }
    .bloc-link {
      background: none;
      border: none;
      color: #1e40af;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-align: left;
      padding: 0;
      display: inline;
    }
    .bloc-link:hover { text-decoration-style: solid; }

    /* ── Right panel: detail ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2.5rem;
      background: #f4f5f7;
    }

    .detail-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
    }

    .detail-content { max-width: 720px }

    .detail-header {
      margin-bottom: 1.5rem;
    }
    .detail-id {
      font-size: .8rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .detail-title {
      font-family: 'Roboto Slab', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2e6e;
      line-height: 1.25;
      margin-bottom: .75rem;
    }
    .detail-badges { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem 1.5rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .detail-meta-grid .meta-item:first-child { grid-column: 1 / -1; }
    .meta-item { }
    .meta-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #999;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .meta-value { font-size: .9rem; color: #333; overflow-wrap: break-word; word-break: break-word; }

    .detail-section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .detail-section-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #999;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    .markdown-body {
      font-size: .9rem;
      color: #444;
      line-height: 1.7;
      overflow-wrap: break-word;
    }
    .markdown-body p { margin-bottom: .75rem }
    .markdown-body p:last-child { margin-bottom: 0 }
    .markdown-body ol, .markdown-body ul { padding-left: 1.25rem; margin-bottom: .75rem }
    .markdown-body li { margin-bottom: .4rem; line-height: 1.6 }
    .markdown-body li:last-child { margin-bottom: 0 }
    .markdown-body strong { font-weight: 600; color: #333 }
    .markdown-body em { font-style: italic }
    .markdown-body a { color: #366BEF }
    .markdown-body a:hover { text-decoration: underline }
    .markdown-body blockquote {
      border-left: 3px solid #d0d0d0;
      padding-left: .75rem;
      color: #666;
      margin: .5rem 0;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      font-family: 'Roboto Slab', serif;
      font-weight: 700; color: #222; margin: 1rem 0 .4rem;
    }

    /* ── More info dropdown ── */
    details.more-info > summary {
      cursor: pointer;
      margin-bottom: 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: .4rem;
      user-select: none;
    }
    details.more-info > summary::-webkit-details-marker { display: none }
    details.more-info > summary::before {
      content: '▸';
      font-size: .8rem;
      transition: transform .15s;
    }
    details.more-info[open] > summary::before { transform: rotate(90deg) }
    details.more-info > summary:hover { color: #1a2e6e }
    details.more-info[open] > summary { margin-bottom: .75rem }
    .more-info-sub { margin-bottom: 1rem }
    .more-info-sub:last-child { margin-bottom: 0 }
    .more-info-sub .detail-section-title { font-size: .7rem; color: #aaa }

    .amendments-list { list-style: none }
    .amendment-item {
      padding: .6rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: .875rem;
    }
    .amendment-item:last-child { border-bottom: none }
    .amendment-text { flex: 1; color: #444 }
    .amendment-result {
      font-weight: 700;
      font-size: .8rem;
    }
    .amendment-result.passed { color: #166534 }
    .amendment-result.failed { color: #991b1b }

    .amendment-main { flex: 1 }
    .amendment-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .amendment-full-text {
      margin-top: .4rem;
      font-size: .85rem;
      color: #555;
      line-height: 1.5;
      padding-left: .25rem;
      border-left: 2px solid #e0e0e0;
    }
    .amendment-movers {
      margin-top: .25rem;
      font-size: .78rem;
      color: #999;
    }
    .minutes-link {
      font-size: .8rem;
      color: #366BEF;
      text-decoration: none;
    }
    .minutes-link:hover { text-decoration: underline }

    .meta-item-full { grid-column: 1 / -1; border-top: 1px solid #f0f0f0; padding-top: .5rem; margin-top: .25rem; }
    .minutes-page-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .875rem;
      color: #366BEF;
      text-decoration: none;
      font-weight: 500;
    }
    .minutes-page-link:hover { text-decoration: underline }

    /* ── Meeting info link button ── */
    .meeting-info-link {
      background: none;
      border: none;
      color: #366BEF;
      font-family: 'Roboto', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }
    .meeting-info-link:hover { text-decoration: underline; }

    /* ── Disclaimer bar (below header) ── */
    .disclaimer-bar {
      flex-shrink: 0;
      background: #fffbe6;
      border-bottom: 1px solid #e8d96a;
      padding: .4rem 1.5rem;
      font-size: .75rem;
      color: #7a6500;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .disclaimer-bar { padding: .4rem 1rem; }
    }

    /* Hide filters on mobile when a detail view is open */
    @media (max-width: 640px) {
      .filters.mobile-hidden { display: none; }
    }

    /* ── Empty state ── */
    .no-results {
      padding: 2rem 1rem;
      text-align: center;
      color: #aaa;
      font-size: .9rem;
    }

    /* ── Back button (mobile only) ── */
    .back-btn {
      display: none;
      align-items: center;
      gap: .4rem;
      background: none;
      border: none;
      color: #1a2e6e;
      font-family: 'Roboto', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      padding: .75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
      width: 100%;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .back-btn:hover { background: #f5f6f9 }

    /* ── Meeting motion rows ── */
    .meeting-motion-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .65rem .5rem;
      border-bottom: 1px solid #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      transition: background .1s;
    }
    .meeting-motion-row:last-child { border-bottom: none; }
    .meeting-motion-row:hover { background: #f5f6f9; }
    .meeting-motion-row:hover .meeting-motion-arrow { opacity: 1; }
    .meeting-motion-arrow { font-size: .8rem; color: #1a2e6e; opacity: 0; transition: opacity .1s; margin-left: auto; flex-shrink: 0; }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      body { overflow: auto }

      .filters {
        flex-wrap: wrap;
        padding: .6rem 1rem;
        gap: .5rem;
      }
      .filters input  { flex: 1 1 100% }
      .filters select { flex: 1 1 calc(50% - .25rem) }

      .workspace {
        flex-direction: column;
        overflow: visible;
        flex: none;
      }

      .list-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        overflow-y: visible;
      }

      .detail-panel {
        padding: 0;
        background: #fff;
        overflow-y: visible;
      }

      /* Hide/show panels via JS-toggled classes */
      .list-panel.mobile-hidden  { display: none }
      .detail-panel.mobile-hidden { display: none }

      .back-btn { display: flex }

      .detail-content {
        padding: 1rem;
        max-width: 100%;
      }

      .detail-title { font-size: 1.2rem }
    }
  </style>
  <script type="module" crossorigin>(function(){const e=document.createElement("link").relList;if(e&&e.supports&&e.supports("modulepreload"))return;for(const i of document.querySelectorAll('link[rel="modulepreload"]'))s(i);new MutationObserver(i=>{for(const a of i)if(a.type==="childList")for(const o of a.addedNodes)o.tagName==="LINK"&&o.rel==="modulepreload"&&s(o)}).observe(document,{childList:!0,subtree:!0});function n(i){const a={};return i.integrity&&(a.integrity=i.integrity),i.referrerPolicy&&(a.referrerPolicy=i.referrerPolicy),i.crossOrigin==="use-credentials"?a.credentials="include":i.crossOrigin==="anonymous"?a.credentials="omit":a.credentials="same-origin",a}function s(i){if(i.ep)return;i.ep=!0;const a=n(i);fetch(i.href,a)}})();const Fe={id:"7.1",title:"Down with Minns and Crisafulli’s Police State",preamble:`The recent scenes of police violence in Sydney were perhaps the most extreme in 50 years (since the first Gay and Lesbian Mardi Gras rally, in ‘78). A man was filmed being punched several times for no reason. A grandmother had four vertebrae broken. A Greens MP was punched and sustained a neck injury. Religious Muslims were beaten up and dragged away while fulfilling their religious obligation to pray.

These scenes were entirely avoidable. Chris Minns and his Labor government could have simply had the police facilitate a peaceful march. Instead of taking this obvious course of action, Minns and his ministers have continued to justify the police violence, despite the fact that most of it was caught on camera. Even worse, Police Minister Yasmin Catley appeared to threaten protesters in parliament, telling them to ‘think again’ because they were ‘deliberately antagonising New South Wales Police’. The aim of this rhetoric, and of the government’s constant new anti-protest laws, seems to be to entirely prohibit protest in certain areas or on certain topics that the government considers inconvenient. It is not hyperbole to say that the Minns government wishes to establish a police state in Sydney.

The Queensland LNP Crisafulli government is also treading on the hard-won freedom of speech of Australians. Under their proposed laws, anyone who says the phrase ‘from the river to the sea’ would face up to 2 years in prison. This law could criminalise entire protest marches of thousands of people, which could lead to mass arrests. This is a phrase that has been said many times by current and former members of this body, including in SRC meetings. To criminalise political expression of this kind is government interference in foundational rights of a kind Australia has not seen in many generations. Like Minns, Crisafulli seems to be establishing a police state.

In the 1950s, the Menzies Liberal government attempted to pass a referendum banning the Communist Party. Although virulently anti-Communist themselves at the time, the Labor Party and its leaders bravely stood with the Communist Party’s rights to political expression, defeating the referendum. Politicians today should be inspired by their example.`,fullText:`1. The SRC opposes the authoritarian actions of the Minns and Crisafulli governments.
2. The SRC stands in solidarity with protestors who have opposed these actions.
3. The SRC adopts the following as a policy statement (in line with our power to set policies for the union): “ANUSA unequivocally stands for the democratic rights of freedom of speech, freedom of association, and freedom of assembly. ANUSA stands for these rights for people and groups who agree with ANUSA’s policy stances, and for those who disagree with them. ANUSA commits to educating students about their right to protest, and to opposing laws and policies which restrict this right.”
4. The ANUSA SRC condemns the removal by police of signs depicting Donald Trump, Vladimir Putin, and other political figures as Nazis from the Dissent Bar in Canberra. Whether or not the ANUSA SRC agrees with these signs, we affirm that they should be protected speech in our democracy. Heavy-handed police overreach has no place in Canberra or anywhere.`,mover:"Seamus Giveen",seconder:"Flynn Wade-Schneiders",minutesPage:6,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.1-7.10"},We=Object.freeze(Object.defineProperty({__proto__:null,default:Fe},Symbol.toStringTag,{value:"Module"})),Ge={id:"7.10",title:"Peaceful Protest Is Fundamental To Our Democracy",preamble:`On 8 February, thousands of peaceful protesters from around Australia rallied against Isaac Herzog’s visit to Australia. In Sydney, this peaceful protest was met with unjustified aggression by the NSW Police Force, leading to multiple protesters being pepper-sprayed, physically assaulted and forcibly dispersed.

Police violence is never justified. Police violence against peaceful protesters and the criminalisation of protest is an attack on democracy itself and represents a dangerous deterioration of civil liberties. This is particularly relevant on a university campus where protest is a fundamental mechanism used to hold the university management to account.

The actions of the NSW police represent a pattern of increasingly aggressive policing enabled by NSW restrictive anti-protest laws and increased police powers. These laws are designed to intimidate, suppress dissent, and deter people (especially students and young people) from exercising their democratic rights and hold governments accountable for their actions.

Further, the attack on peaceful religious demonstrations shows how these powers are increasingly being used to target communities exercising their basic freedoms of expression and faith. This pattern of repression threatens the ability of students to organise, mobalise, and speak out against injustice without fear of state violence.`,fullText:`1. ANUSA condemns the actions of NSW police as an entirely inappropriate and disproportionate attack on peaceful protest.
2. ANUSA condemns the actions of the Chris Minns Government and the restrictive anti-protest laws they have passed, which enable police violence and suppress democratic participation.
3. ANUSA stands with NSW University campuses who were directly affected by the violence used by police at the Sydney protest.
4. ANUSA reaffirms the importance of the right of students to peacefully protest on campus.`,mover:"Seamus Giveen",seconder:"Flynn Wade-Schneiders",minutesPage:7,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.1-7.10"},Ve=Object.freeze(Object.defineProperty({__proto__:null,default:Ge},Symbol.toStringTag,{value:"Module"})),Je={id:"7.11",title:"Opposing the Centralisation of Student Services at ANU",preamble:`Coming into 2026, every student, regardless of whether they’re undergraduate, postgraduate, or HDR, is feeling the consequences of Renew ANU. One of the most significant impacts is the centralisation of student support services under the DVCA portfolio. Students deserve support systems that strengthen their university experience, not services stripped of resources and the institutional knowledge that once made them effective.

Across the university, we’ve already seen what centralisation looks like in practice: threatened drop-ins in Science and Medicine, the loss of the essential enquiries team in Law, and reduced support hubs in CAP. As has consistently been the way, it is students who continue to pay the price for the University’s mismanagement.

Colleges have long had dedicated, discipline specific support structures. In the face of centralisation, it is more important than ever for ANUSA to step up – to provide consistent, reliable, and structured academic support, and to oppose changes that diminish what students rely on. The University insists that new “student hubs” will minimise disruption, but transition periods are full of uncertainty, and the value of college-specific expertise cannot be overstated. Under the new model, the college-based teams students know will be absorbed into a centralised “Student Engagement and Academic Management” (SEAM) unit. The final implementation plan released on 5 December confirms 430 positions under the DVCA, with the originally proposed 93 disestablishments reduced to 72. But even with 14 staff reallocated, it is unclear how such a small number can replace the depth, breadth, and quality of support previously provided by specialised college teams.

Strengthening academic support at the college level should be a core priority of the University. Instead, centralisation collapses diverse disciplines into generic hubs and erodes years of accumulated expertise. Students recognise the need for support systems that serve everyone; but the current model prioritises cost-cutting over quality, and assumes that a single centralised unit can somehow meet the needs of every student, in every program, across every college.

Under the ANU Act, the University is obligated to “advance and transmit knowledge through research and teaching of the highest quality.” Renew ANU showed us our university’s inherent failure to meet its obligations to the staff and student community, and how the ramifications will continue into 2026. Teaching and learning is not isolated to supporting students; they are interrelated. Providing necessary support, be it academic or wellbeing, enables students to make the most of their time at the ANU and excel. Centralisation of such valuable services lies in direct opposition with the ANU’s mission; we call on the university to centre students, rather than cost efficiency and convenience, when it comes to support services that define our academic experience.`,fullText:`1. The ANUSA SRC calls on the university to publish clear transition timelines and oppose any further disestablishments or role consolidations that diminish specialist knowledge.
2. Advocate for the retention of discipline-specific academic support roles within each college, even under a centralised SEAM structure.
3. Acknowledging that the ANU should take primary responsibility for providing student-facing services and supports, endorse in tandem the expansion of ANUSA’s academic support services, facilitated by collaboration between the college representatives, academic officers, education officer, and student assistance team.
4. Support staff and student solidarity actions opposing cuts that undermine teaching, learning, and wellbeing.
5. Push for consistent and genuine student involvement in designing an academic support system for students that prioritises specialisation, quality services, and the expertise felt within each diverse college.
6. Call on the ANU to align its support structures with its legislated duty to provide research and teaching of the highest quality, and acknowledge how centralisation erodes the support systems that enable students to succeed.`,originalText:`1. The ANUSA SRC calls on the university to publish clear transition timelines and oppose any further disestablishments or role consolidations that diminish specialist knowledge.
2. Advocate for the retention of discipline-specific academic support roles within each college, even under a centralised SEAM structure.
3. Endorse expansion of ANUSA’s academic support services, facilitated by collaboration between the college representatives, academic officers, education officer, and student assistance team.
4. Support staff and student solidarity actions opposing cuts that undermine teaching, learning, and wellbeing.
5. Push for consistent and genuine student involvement in designing an academic support system for students that prioritises specialisation, quality services, and the expertise felt within each diverse college.
6. Call on the ANU to align its support structures with its legislated duty to provide research and teaching of the highest quality, and acknowledge how centralisation erodes the support systems that enable students to succeed.`,mover:"Aurora Neumann",seconder:"Chith Weliamuna",minutesPage:26,type:"Motion",status:"Passed",amendments:[{text:"Strike action point 3",fullText:"1. Strike action point 3.",mover:"Ell Lappin",seconder:"Chris Morris",passed:!1,friendly:!1},{text:"Amend point 3: ANU takes primary responsibility; ANUSA expansion in tandem",fullText:'1. Amend point 3 to read: "Acknowledging that the ANU should take primary responsibility for providing student-facing services and supports, endorse in tandem the expansion of ANUSA’s academic support services, facilitated by collaboration between the college representatives, academic officers, education officer, and student assistance team."',mover:"Jemma Rule",seconder:"Katie Jakab",passed:!0,friendly:!1}]},Ke=Object.freeze(Object.defineProperty({__proto__:null,default:Je},Symbol.toStringTag,{value:"Module"})),Qe={id:"7.12",title:"Opposing the University ‘Report Card’ System",preamble:`*Trigger warning: racism and institutional betrayal.*

The Australian Human Rights Commission’s recent national study (initiated through a Universities Accord recommendation) exposes the scale of racism across Australian campuses. Of the 76,000 staff and students surveyed, 70% reported experiencing indirect racism, with the rates for Jewish and Palestinian students and staff exceeding 90%. These findings make clear that racism is not an isolated problem; it is systemic, widespread, and deeply felt in our universities.

Yet, instead of responding with measures that protect students and staff, the Albanese Government has introduced a controversial university report card system in the wake of the Bondi terror attack. Developed by the Antisemitism Envoy, this framework claims to combat antisemitism but instead grades universities on how effectively they suppress protest, including encampments, political expression, and even the display of flags. Priority Area 1 explicitly targets policies regulating “access to campus grounds…outdoor protests, encampments and display of flags, imagery and promotional materials.”

At ANU we have already seen how restrictive policies, such as the tightening of poster regulations, shrink the space available for political expression.

The AHRC’s findings demand a serious, comprehensive response to all forms of racism, including antisemitism and Islamophobia. Instead, the report card system conflates legitimate criticism of a genocide with antisemitism. This approach neither protects Jewish students nor addresses the real drivers of racism on campus. What it does achieve is the suppression of student activism.

Threatening to withdraw funding from universities that fail to comply (in the midst of a higher education funding crisis) will not make campuses safer. It will undermine universities’ core missions of teaching, research, and critical inquiry. Universities must be able to confront racism in all its forms while also protecting the right of students and staff to protest.`,fullText:`1. ANUSA supports Palestine activism and recognises the integral role of protest on campus. ANUSA recognises that Palestine protests in and of itself is not inherently antisemitic.
2. ANUSA opposes the report card system and calls for an appropriate institutional response to end antisemitism on campus, such as specific reporting pathways, ongoing consultation, and further educational initiatives about how antisemitism manifests.
3. ANUSA condemns the government policy of antisemitism report cards and recognises that this is a mechanism to suppress legitimate Palestine protest.
4. ANUSA affirms its commitment to supporting all students on campus and ensuring that university is a safe and welcoming place for all, regardless of religion or ethnicity.`,mover:"Aurora Neumann",seconder:"Leila Clarke",minutesPage:30,type:"Motion",status:"Passed",amendments:[]},Ze=Object.freeze(Object.defineProperty({__proto__:null,default:Qe},Symbol.toStringTag,{value:"Module"})),Ye={id:"7.13",title:"Nature In Decline - Sullivan’s Creek",preamble:`Sullivan’s Creek is a crucial part of the ANU experience for all of our in-person students. For the thousands of on-campus students it’s an essential part of the daily commute around campus. For our off-campus students, it too is a crucial landmark and feature of the landscape of the university.

Over the past 30 years the ANU has been attempting to redevelop and re-naturalise parts of the creek with steady progress. The latest step has been through the installation of Gabion Mattress and deliberate planting of native species around the creek. This was continuing smoothly starting up at the top of the creek as it entered ANU campus after the Grosse Particulate Trap under Barry Drive. This was until ANU Landscape and Conservation lost funding for the project during the earlier rounds of cuts. This has left most of the creek in a state of limbo. Algal blooms occur in the 3 settling ponds in the creek at least once a year which clog the creek with sediment and lead to fish die offs as they face oxygen deprivation in the water. With ever increasing temperatures and growingly infrequent rainfall, the traditional high-flow flood periods that usually clear out the stream are becoming increasingly rare. Without urgent landscape action soon, the creek will continue to face worsening biological outcomes and higher upkeep costs with more devastating high-flow flooding periods. A first step from the ANU is to restore funding to ANU Landscapes and Conservation to continue their long term project of rewilding the creek to make it suitable for the unique water systems and species in the Inner North.

Without this important restoration of funding, biodiversity will continue to decline, debris will pile up along the banks of the creek after every rainfall and the ability of the ANU community to enjoy any recreational benefit from the creek will be lost.`,fullText:`1. SRC endorses refunding the ANU Landscape and Conservation team to pre-2019 levels
2. SRC demands general action on the water quality and health of the waterways that are so crucial to the ANU and its unique identity
3. SRC encourages the ANU to explore working with its own Fenner School of Environment to develop new ways to encourage biodiversity on campus
4. SRC endorses the unique benefits Sullivan’s Creek provides to the student and staff population of the university`,mover:"Flynn Wade-Schneiders",seconder:"Audrey Storer",minutesPage:32,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.13-7.14"},Xe=Object.freeze(Object.defineProperty({__proto__:null,default:Ye},Symbol.toStringTag,{value:"Module"})),et={id:"7.14",title:"Divestment in 2026 - The Overdue Reforms",preamble:`The ANU community has been formally pushing for the ANU to divest itself of its fossil fuel investments for almost a decade and a half. Falling under the names ‘ANU Zero’ and ‘Fossil Free ANU’, both staff and students have been campaigning for years. This year, the Environment Collective (EC) is stepping this into a new gear.

After the course and staff cuts of last year and the following community and media backlash, the ANU is in a uniquely weak position. This makes now the perfect time to present the university with an alternative story in the media cycle. By revamping the campaign to new heights this year, the Collective wants to give the university an opportunity to take on divestment themselves with the support of the student body, or to risk another media blowout in which the ANU will be look as out of touch and unresponsive to the student body as it was under VC Bell.

With the tumultuous years of the EC now firmly behind us, the department itself is now finally primed to take on and lead this campaign. After a highly successful O Week, environmental activism is at the forefront of our student body’s mind.

Pending our upcoming General Divestment Meeting, the 2026 EC executive has endorsed a campaign goal of eliminating substantive fossil fuel investment by amending the Socially Responsible Investment Policy to negatively screen against the 200 highest emitting publicly traded companies. Under this proposal, the ANU’s two largest climate emitting investments in Woodside and BHP would no longer be compliant. This ‘top 200’ screening strategy was taken by La Trobe University in their own divestment policy back in 2015. This itself was inspired by the ANU’s limited divestment efforts in 2014.`,fullText:`1. The SRC endorses the 2026 Fossil Fuel Divestment Campaign of the Environment Collective
2. The SRC endorses amending the Socially Responsible Investment Policy by including restrictions on the top 200 highest emitting companies that are publicly traded.
3. The SRC opposes the deliberate choice of the ANU to continue its investments in fossil fuels despite reconvening its Investments Committee on the 16th of February 2026.
4. The SRC encourages the Undergraduate Representative on the ANU Council to re-raise the fossil fuel investment concerns of the SRC during the ANU Council in 2026.`,mover:"Flynn Wade-Schneiders",seconder:"Audrey Storer",minutesPage:33,type:"Motion",status:"Passed",amendments:[],bloc:"bloc-7.13-7.14"},tt=Object.freeze(Object.defineProperty({__proto__:null,default:et},Symbol.toStringTag,{value:"Module"})),nt={id:"7.15",title:"Clubs Affiliation",preamble:`The following is the list of clubs approved for affiliation:

- Minorities in Arts and Science: an Intersectionality Collective at ANU`,fullText:"1. The SRC approves the list of clubs in this motion’s preamble for affiliation with ANUSA.",mover:"Dylan Rafel Adams",seconder:"Charley Ellwood",minutesPage:34,type:"Motion",status:"Passed",amendments:[]},it=Object.freeze(Object.defineProperty({__proto__:null,default:nt},Symbol.toStringTag,{value:"Module"})),st={id:"7.2",title:"March 11 Student Strike",preamble:`A recent [investigation](https://www.google.com/amp/s/www.aljazeera.com/amp/features/2026/2/10/israel-used-weapons-in-gaza-that-made-thousands-of-palestinians-evaporate) revealed that Israel has used thermal and thermobaric munitions to evaporate nearly 3,000 Palestinians since October 2023. In the same week as this report was released, Albanese literally rolled out the [red carpet](https://x.com/i/status/2021547516924453334) for Israeli President Isaac Herzog and toured Australia with him. Herzog has been found to have [incited genocide](https://www.theguardian.com/commentisfree/2026/feb/05/albanese-can-still-withdraw-the-invitation-to-israels-president-he-should-do-so-for-the-sake-of-social-cohesion-ntwnfb) by the UN Commission of Inquiry on Palestine.

Across the country tens of thousands defiantly mobilised to protest our government’s veneration of this inciter of genocide, multiple times throughout the visit. This included 20,000 in Sydney who came out despite Chris Minn's draconian banning of the protest. NSW Police shamefully brutalized peaceful protesters, including a 69 year old woman who [broke 4](https://www.theguardian.com/australia-news/2026/feb/14/sydney-protesters-want-to-sue-police-over-alleged-brutality-at-the-anti-herzog-rally-but-it-will-be-a-struggle-ntwnfb) [vertebrae](https://www.theguardian.com/australia-news/2026/feb/14/sydney-protesters-want-to-sue-police-over-alleged-brutality-at-the-anti-herzog-rally-but-it-will-be-a-struggle-ntwnfb) after police pushed her violently to the ground. The repression of the protest underlies the importance of continuing to support pro-palestine protests. We cannot let our leaders infringe on our democratic rights and beat us into silence and submission to the status quo. Despite the supposed ceasefire, Israel has continued to target the Gaza strip on a near daily basis, resulting in the deaths of [591 Palestinians](https://aje.news/f5ievd) since the ceasefire. As of February 10 Israel has breached the terms of the ceasefire at least 1,620 times. Israel continues its Illegal blockade preventing vital supplies from getting into the Gaza strip, including [tent poles,](https://www.theguardian.com/world/2025/nov/20/look-at-us-with-mercy-displaced-palestinians-dread-onset-of-harsh-winter?CMP=Share_AndroidApp_Other) the last form of shelter Palestinians have, As Israel continues to demolish buildings across the Gaza Strip. Winter storms have wracked Gaza since November destroying many tents, forcing Palestinians to construct tents out of inferior less protective materials. As a result many, particularly children are dying of [hypothermia](https://www.aljazeera.com/amp/news/2026/1/13/eight-dead-in-gaza-as-storm-brings-extreme-cold-collapses-buildings).

We cannot stand by and allow our government to continue supporting this genocide, we have to keep protesting for Palestine. Students for Palestine and the National Union of Students have called a national student strike for the 11th of March. The Canberra leg will be held at 1pm, outside BAE systems on the corner of Childers Street and University Avenue.`,fullText:`1. ANUSA endorses the March 11 Student Strike for Palestine
2. ANUSA condemns the Minns government and the NSW Police for their response to the protest against Isaac Herzog
3. ANUSA defends the democratic right to peaceful protest
4. The SRC encourages the President to promote the Student Strike on ANUSA social media
5. The SRC urges the Executive and Trustees to spend up to $250 on poster and leaflet printing to promote the Student Strike`,mover:"Carter Chryse",seconder:"Ell Lappin",minutesPage:8,type:"Motion",status:"Passed",amendments:[]},at=Object.freeze(Object.defineProperty({__proto__:null,default:st},Symbol.toStringTag,{value:"Module"})),ot={id:"7.3",title:"Digital Student ID cards",preamble:`Losing a student identification card can be a stressful and sometimes costly experience. In the case of student accommodation, losing a room key can leave students locked out and in dangerous situations.

New technologies allow for the implementation of digital student IDs and room keys. This allows students to leave their physical cards at home, and access services from their mobile devices. The University of Sydney and Monash University have led the way in implementing digital student ID cards, and it is time that ANU follows suit.

All universities should make this investment in student safety and wellbeing, and our policy as ANUSA should reflect this. This is a matter of student safety, convenience, and wellbeing.`,fullText:`1. The SRC adopts as ANUSA policy support for the implementation of digital student ID cards by the University, in line with the model adopted by the University of Sydney.
   a. The SRC recognises that this model allows physical student ID cards to remain an option for all students, and affirms this is a requirement.
2. The SRC recognises the accessibility, safety, convenience and wellbeing benefits brought by the implementation of digital student ID cards.
3. The SRC encourages the University to further investigate the implementation of digital room keys for residential halls.`,mover:"Malakai King",seconder:"Lea Fallen",minutesPage:10,type:"Motion",status:"Passed",amendments:[]},rt=Object.freeze(Object.defineProperty({__proto__:null,default:ot},Symbol.toStringTag,{value:"Module"})),lt={id:"7.4",title:"General Representative Reports policy update",preamble:"",fullText:`1. The SRC adopts it as administrative Policy of the Association that General Representatives shall deliver reports on their activities to each of SRC2, SRC4, SRC6 and SRC8.
2. The SRC affirms that these reports need not be extensive or even be delivered verbally, and instead need merely be a summary that both:
   a. Provides guidance to the Executive on how General Representatives can best be supported; and
   b. Provides accountability to the student body.`,mover:"Malakai King",seconder:"Will Roche",minutesPage:11,type:"Motion",status:"Passed",amendments:[]},ct=Object.freeze(Object.defineProperty({__proto__:null,default:lt},Symbol.toStringTag,{value:"Module"})),dt={id:"7.5",title:"ANU and its ineffective Sexual Assault and Sexual Harrassment (SASH) reporting process",preamble:`*Content Warning: Sexual Assault and Sexual Harrassment (SASH) are discussed in this motion. This motion uses the term "women" to encompass the ANUSA Women's Department's membership as defined in their constitution. This includes all students who identify as women, and all gender diverse and intersex students who identify with the term "women".*

Given the dangers women face every second of their lives, we should be allowed to have one moment of peace. This is especially relevant in our own homes and on our campuses, which should ALWAYS be safe spaces for women to live and study. This however, is not the case.

The Australian Human Rights Commission Change the Course found in 2017 that 1 in 5 women students at ANU has experienced some form of SASH, whether this is in their own residential halls and on university grounds. We all know that underreporting is an innate feature of this crime. With that being said, the number of SASH related incidents would obviously be exponentially higher. Despite this, the 2024 Sexual Misconduct Annual Report somehow found that reports of SASH have dropped by almost half.

As a student at this university who lives at a residence hall, I can confirm that this is not because SASH has decreased at the ANU. It is a persisting issue that has never left the campus. So why has reporting dropped by this much?

This “drop” in SASH related incidents is simply because of the incompetence of disclosure and reporting processes at the ANU. They do not work. Reports after reports and complaints after complaints from victim survivors show a repeated failure of these ANU processes, and yet nothing is changing. The privatised reporting process does not effectively protect victim-survivors or adequately provide them with support. Rather, it often leads to a daunting and lengthy process that often re-traumatises victim-survivors. Perpetrators are passed around Res Halls with little to no accountability for their actions. Staff at these halls have almost no autonomy to actually do anything about it. SASH continues to endanger students and the system of the ANU is nothing more than performative; existing to protect the university from liability, not help victims of this crime.

To highlight the immediate need and emergency in alleviating SASH rates, Our Watch has found that students who had experienced sexual harassment and/or sexual assault within a university context described detrimental impacts of this violence on their mental health, forming and maintaining meaningful relationships, as well as university attendance, performance, and participation.

If women students struggle to feel safe, even when living in their own residential halls, you KNOW that the University is not doing enough to address this crime that is occurring on their campus.`,fullText:`1. To call on the ANU to provide and develop more accessible ways for victims to receive justice, including:
   a. A reporting process that is co-designed by people with lived experience.
   b. A reporting process that informs and engages with the victim-survivor at every step and development with full transparency. Perpetrators must not be provided with victim-survivors report statements and the safety of the victim-survivor must be the first priority of the reporting process.
   c. A reporting process that allows the victim-survivor to recommend and provide advice on the outcome of the report.
   d. A reporting process that reduces any opportunity for direct confrontation between victim-survivors and perpetrators.
   e. A consistent policy and SASH reporting process that aligns with the National Higher Education Code to Prevent and Respond to Gender-based Violence.
2. To call on the SRC to advocate for a single, centralised and trauma informed disclosure tool that is easily accessible for all students. To be more accessible, this could be found on the ANU website.
3. To call on the university to conduct a mass investigation on SASH incidents in residential halls and cooperate with leadership in halls to create an effective reporting process and proper and harsher consequences for perpetrators. This must comply with the recommendations under the Student Disciplinary Framework Review and Gender-based Violence Prevention and Response Plan.
4. To call on the university to establish a new review that reflects and expands on the 2018 NOUS review focusing on the culture in residential halls and its contribution to Gender-Based Violence, SASH, misogyny, and patterns reflecting a patriarchal system that undermines students identifying as women, non-binary, and trans.
   a. This must also expose and address the flaws in the training of CSOs, Heads of Halls, SRs, and Residential Wellbeing Coordinators.
5. To call on the university to improve training of CSOs, Heads of Halls, SRs, Residential Wellbeing Coordinators to provide and create accessible services that are trauma-informed, culturally and queer inclusive and diverse. This requires disclosure training and for all leadership in residential halls to commit to changing the culture of their respective halls to create an environment that supports victim-survivors and implement the necessary changes outlined in action three (3).
6. To call on the university to create and support more autonomous spaces for women, particularly wings or floors in ANU residences specific for women to live in.
   a. This includes greater promotion of the Rose Room as an autonomous study and social space, and supporting the establishment of similar spaces in residential halls.`,originalText:`1. To call on the ANU to provide and develop more accessible ways for victims to receive justice, including:

2. Replace in the preamble, "Female Identifying is abbreviated to FI in this motion." with "This motion uses the term "women" to encompass the ANUSA Women's Department's membership as defined in their constitution. This includes all students who identify as women, and all gender diverse and intersex students who identify with the term "women"."

2. Amend the motion to replace all uses of the terms ‘female-identifying’, ‘fem* identifying’ and ‘FI’ with the word ‘women’.

*Point 2 was ruled invalid by the Chair as it contradicted the already-accepted friendly amendment above. The remainder failed on a vote.*`,mover:"Carter Chryse",seconder:"Ell Lappin",passed:!1,friendly:!1}]},ut=Object.freeze(Object.defineProperty({__proto__:null,default:dt},Symbol.toStringTag,{value:"Module"})),ht={id:"7.6",title:"Bondi Condolence Motion",preamble:`On 14 December last year, our country experienced the most vile antisemitic act ever committed on our shores. People who had gathered at Bondi to celebrate the first night of Chanukah, as they had done for many years, were peacefully practising their religion when they were met with gunfire from those who did not believe in the fundamental right for people to celebrate and embrace their culture.

15 innocent lives were taken that day. People who, only moments prior, had been celebrating with their family and friends had their lives changed forever. People who had believed, as they should have been able to, that they would be safe celebrating Chanukah.

It is important that we recognise that this act of antisemitism is the worst this country has ever seen. Antisemitism has no place in our communities, and we all need to continue to ensure that we call antisemitism out when we see, hear or otherwise witness it. As a Student Union which at its core strives to advance the cause of anti-racism, it is essential that we condemn this vile antisemitic act, and assure all students, including those who are Jewish, that they are safe and valued at our country's national university.`,fullText:`1. ANUSA expresses its condolences for the victims of the antisemitic terrorist attack at Bondi on 14 December.
2. ANUSA condemns antisemitism in all its forms, especially on university campuses.
3. ANUSA reaffirms its position to ensure solidarity with all peoples who experience racism and discrimination, and commits to fighting racism and discrimination in all of its forms on this campus.`,mover:"Oscar Greenfield",seconder:"Flynn Wade-Schneiders",minutesPage:16,type:"Motion",status:"Passed",amendments:[]},pt=Object.freeze(Object.defineProperty({__proto__:null,default:ht},Symbol.toStringTag,{value:"Module"})),mt={id:"7.7",title:"Student-Centred Reform to Strengthen Fairness and Flexibility in the ECA Framework",preamble:`Extenuating Circumstance Applications (ECAs) are a critical mechanism through which students experiencing illness, disability, caring responsibilities, financial hardship, or other adverse circumstances are able to pursue their studies and be assessed on an equitable basis. However, the current ECA framework places a disproportionate administrative and evidentiary burden on students, often requiring repeated documentation for ongoing or well-established circumstances, regardless of prior approvals or consistent medical advice.

In practice, this burden is exacerbated by the highly restrictive structure of the ECA system. Students are currently permitted to apply for only one ECA provision for a given assessment, and may only appeal a rejection of that same provision. Where both the initial application and any subsequent appeals are rejected, students are not permitted to submit a new ECA application for a different form of support for that assessment, leaving them with no remaining avenue to seek alternative assessment arrangements from the Exams Office.

For example, where a student’s application for an alternative assessment format, such as a take-home exam in place of a traditional in-person exam, is rejected and upheld on appeal, that student is unable to apply for a different ECA provision, such as adjusted assessment weighting.

Similarly, where a student is successful in an application for changed assessment weighting for an exam, but later experiences additional hardship, such as a sudden short-term illness that significantly compromises their capacity to perform academically, they are unable to apply for a deferred assessment, having already exhausted their single ECA application for that assessment.

In addition, the inconsistent application of ECAs across courses and colleges creates uncertainty, stress, and inequitable academic outcomes for students navigating the same circumstances under different academic units. These inconsistencies compound the harm caused by an already inflexible system.

A student-centred university should carefully listen to student feedback on an assessment process that students consistently describe as unnecessarily complex, rigid, and distressing, recognising that students themselves are best placed to articulate the impacts of these processes on their learning and wellbeing; a student-centred university should take immediate and practical action to reduce avoidable administrative barriers and procedural gatekeeping; and a student-centred university should ensure that assessment processes afford students accessibility, dignity, and flexibility, particularly students with ongoing or episodic conditions for whom repeated evidentiary hurdles and inflexible rules are unreasonable and harmful.

Our University continues to fail students on each of these fronts. If it seeks to credibly, realistically, and non-performatively declare itself student-centred, substantive reform of the ECA process is not just desirable but inherently necessary. ANUSA therefore has a responsibility to advocate for assessment systems that are fair, transparent, consistent, and genuinely responsive to student wellbeing.

The 2025 ECA Working Group delivered meaningful improvements in relation to cultural and religious commitments, but its work is not over; there are still core structural barriers within the ECA framework. Further reform therefore remains necessary, and the continuation and expansion of this work has been identified by the Education Committee as a primary objective for 2026.`,fullText:`1. Adopt as policy support for reform to the Extenuating Circumstance Application (ECA) framework to ensure that no student is left without a viable form of academic or assessment support due to rigid procedural constraints.
2. Advocate for the retention of the one-provision-at-a-time ECA rule, recognising its role in preserving administrative clarity and simplicity, and maintaining manageable administrative demand on the Exams Office.
3. Advocate for a targeted amendment to the ECA framework such that, where a student’s initial ECA application for a particular provision is rejected and that rejection is upheld on appeal, the student is permitted to submit a new ECA application for a different provision for the same assessment.
   a. Affirm that this reform is intended to operate only where an initial application and appeal have failed, and is not intended to allow multiple concurrent ECA provisions for a single assessment.
4. Support the continuation and expansion of the ECA Working Group in 2026, with a focus on addressing remaining structural barriers within the ECA framework and improving consistency, fairness, and student wellbeing outcomes, recognising that students are best placed to identify student needs.
   a. Affirm the central role of students with lived experience in shaping assessment accessibility policy, and support student-led or student-inclusive feedback and consultation mechanisms to ensure their voices remain embedded in decision-making processes.
5. Support the ANUSA Education Officer in reporting to the Student Representative Council at each meeting on progress made toward these objectives.`,mover:"Tyne Jones",seconder:"Aurora Neumann",minutesPage:17,type:"Motion",status:"Passed",amendments:[]},ft=Object.freeze(Object.defineProperty({__proto__:null,default:mt},Symbol.toStringTag,{value:"Module"})),gt={id:"7.8",title:"Reforming the EAP Framework to Ensure Consistent and Clinically Guided Assessment Access",preamble:`In this motion, an alternative assessment refers to a formal modification to the type or structure of an assessment task itself, rather than merely an adjustment to the conditions under which it is undertaken. This may involve converting an in-person invigilated exam into a take-home assessment, replacing an in-person invigilated exam with an equivalent written assignment, or substituting a live presentation with a recorded or alternative format. In each case, the academic learning outcomes and standards remain unchanged; what is altered is the form through which a student demonstrates their achievement, in order to ensure equitable participation.

An alternative assessment constitutes a form of reasonable adjustment; however, it is distinct from adjustments that modify the conditions of assessment rather than its structure. Condition-based adjustments may include additional time, changes to location, modified scheduling such as deferred exams, rest breaks, assistive technology, or alternative seating arrangements. By contrast, an alternative assessment alters the mode or format of the task itself while maintaining academic equivalence, ensuring that students are not disadvantaged by the form of assessment but are assessed against the same substantive criteria.

Educational Access Plans (EAPs) are intended to ensure that students with disability, chronic illness, other ongoing health conditions, parent and carer responsibilities, and athletic commitments can participate in their studies on an equitable basis. They do so through the provision of reasonable adjustments designed to remove structural barriers to participation.

However, the current EAP framework does not provide a clear or reliable mechanism for embedding alternative assessment methods within an EAP as a recognised form of reasonable adjustment. As a result, such arrangements cannot be formally incorporated into a student’s EAP, even where they are clinically recommended by a treating health practitioner.

As a result, students whose health practitioners, including general practitioners and psychiatrists, have identified a clear and ongoing need for alternative assessment arrangements in Health Reports are still required to submit separate Extenuating Circumstance Applications to the Exams Office for each instance in which those arrangements are required. This creates a repetitive, burdensome, and fragmented process that undermines the purpose of EAPs as a mechanism for providing stable, consistent support across a student’s degree.

In practice, this structure imposes a significant administrative burden on students with an ongoing need for alternative assessments. For example, a student undertaking a four-year degree who requires two alternative assessment arrangements per course per semester would be required to submit 64 separate applications to the Exams Office over the course of their studies, despite their circumstances and/or medical recommendations remaining unchanged. What does change, however, is the individual assessing the application and their judgements regarding a student’s personal circumstances, resulting in material variation in interpretation and outcomes despite identical circumstances and/or medical evidence.

In the context of students with disability, chronic illness, or other ongoing health conditions, this raises a serious structural concern. Because alternative assessments cannot be formally incorporated into an EAP, assessment determinations must instead be made repeatedly through the Exams Office. These decisions are therefore made by staff who do not possess the same disability-specific training and awareness as Accessibility staff, despite relying on the same underlying health documentation. This structure also places unnecessary administrative pressure on the Exams Office by requiring repeated consideration of substantively identical requests.

A student-centred university should ensure that assessment accessibility mechanisms operate in a way that is coherent, consistent, and – where relevant – aligned with medical advice, rather than requiring students to repeatedly re-justify established needs. Where alternative assessment methods are clinically recommended as part of a student’s ongoing access requirements, or reasonable given parent, carer or athletic commitments, they should be embedded within existing support structures, rather than treated as exceptional or ad hoc.

ANUSA therefore has a responsibility to advocate for an EAP framework that provides certainty, consistency, and dignity for students with ongoing health conditions, parent and carer responsibilities, and athletic commitments. At the same time, any reform must preserve clear lines of academic responsibility and maintain reasonable, workable administrative processes.

That said, the diversity of experiences within the EAP framework must be acknowledged. This motion does not seek to generalise the experience of any one student as representative of all, but rather to address identifiable structural issues while recognising that individual experiences vary.`,fullText:`1. Support reform of the Educational Access Plan (EAP) framework to enable alternative assessment methods to be included within Health Reports and EAPs where clinically appropriate.
2. Advocate for amendments to the Health Report and EAP framework to allow a registered health practitioner to specify:
   a. the assessment format being adjusted (from and to),
   b. the rationale for the adjustment, and
   c. the circumstances under which the adjustment should apply.
3. Support the embedding of approved alternative assessment methods within a student’s EAP, such that students are not required to submit repeated applications to the Exams Office for substantively identical adjustments.
4. Support the exploration of a dedicated EAP working group or equivalent student-led consultative process, in collaboration with the ANUSA Education Officer, the Education Committee, Disability Students’ Association and students with lived experience to inform ongoing reform of the EAP framework.
   a. Recognise the necessity of comprehensive staff training in developing an effective, student-centred EAP framework, and ensure that the design, scope, and delivery of such training is formally advised upon by the EAP Working Group, with no framework implemented or expanded without training endorsed as sufficient to support consistent, equitable, and objective-aligned delivery.`,originalText:`1. Support reform of the Educational Access Plan (EAP) framework to enable alternative assessment methods to be included within Health Reports and EAPs where clinically appropriate.
2. Advocate for amendments to the Health Report and EAP framework to allow a registered health practitioner to specify:
   a. the assessment format being adjusted (from and to),
   b. the rationale for the adjustment, and
   c. the circumstances under which the adjustment should apply.
3. Support the embedding of approved alternative assessment methods within a student’s EAP, such that students are not required to submit repeated applications to the Exams Office for substantively identical adjustments.
4. Recognise the necessity of comprehensive staff training in developing an effective, student-centred EAP framework, and that no framework should be implemented or expanded without appropriate training to ensure staff are equipped to deliver it consistently, equitably, and in alignment with its intended objectives.
5. Support the exploration of a dedicated EAP working group or equivalent student-led consultative process, in collaboration with the ANUSA Education Officer, the Education Committee, Disability Students’ Association and students with lived experience to inform ongoing reform of the EAP framework.`,originalPreamble:`Educational Access Plans (EAPs) are intended to ensure that students with disability, chronic illness, or other ongoing health conditions can participate in their studies on an equitable basis through the provision of reasonable adjustments. However, the current EAP framework draws an artificial and impractical distinction between “reasonable adjustments” and alternative assessment methods, preventing the latter from being embedded in Health Reports and EAPs.

As a result, students whose health practitioners, including general practitioners and psychiatrists, have identified a clear and ongoing need for alternative assessment arrangements in Health Reports are still required to submit separate Extenuating Circumstance Applications to the Exams Office for each instance in which those arrangements are required. This creates a repetitive, burdensome, and fragmented process that undermines the purpose of EAPs as a mechanism for providing stable, consistent support across a student’s degree.

In practice, this structure imposes a significant administrative burden on students with ongoing conditions. For example, a student undertaking a four-year degree who requires two alternative assessment arrangements per course per semester would be required to submit 64 separate applications to the Exams Office over the course of their studies, despite their circumstances and medical recommendations remaining unchanged. What does change, however, is the individual assessing the application and their judgements regarding a student’s personal circumstances, resulting in material variation in interpretation and outcomes despite identical circumstances and medical evidence.

This raises a serious question as to why assessment determinations are repeatedly made by administrative staff without medical or clinical training, rather than being guided by the consistent advice of qualified health professionals who are directly familiar with a student’s needs. It also places unnecessary administrative pressure on the Exams Office by requiring repeated consideration of substantively identical requests.

A student-centred university should ensure that assessment accessibility mechanisms operate in a way that is coherent, consistent, and aligned with medical advice, rather than requiring students to repeatedly re-justify established needs. Where alternative assessment methods are clinically recommended as part of a student’s ongoing access requirements, those methods should be embedded within existing support structures rather than treated as exceptional or ad hoc.

ANUSA therefore has a responsibility to advocate for an EAP framework that provides certainty, consistency, and dignity for students with ongoing health conditions, while maintaining clear lines of academic responsibility and reasonable administrative processes.`,mover:"Tyne Jones",seconder:"Aurora Neumann",minutesPage:19,type:"Motion",status:"Passed",amendments:[{text:"Strike all and replace with a revised preamble and action",fullText:`Strike all and replace with a revised preamble and action, expanding the framework's scope to parent, carer and athletic commitments and folding staff training into the EAP Working Group's remit.

*Recorded in the minutes under the heading "Foreshadowed amendment to Motion 7.9 – #1", which appears to be a numbering error: it was moved, accepted as friendly, and resolved during debate on Motion 7.8.*`,mover:"Tyne Jones",seconder:"",passed:!0,friendly:!0}]},yt=Object.freeze(Object.defineProperty({__proto__:null,default:gt},Symbol.toStringTag,{value:"Module"})),bt={id:"7.9",title:"Implementation of the National Higher Education Code to Prevent and Respond to Gender-based Violence",preamble:`*Content Warning: Domestic and Gender-based violence, femicide. ‘National Higher Education Code to Prevent and Respond to Gender-based Violence’ is abbreviated to ‘National Code’.*

*This motion uses the term "women" to encompass the ANUSA Women's Department's membership as defined in their constitution. This includes all students who identify as women, and all gender diverse and intersex students who identify with the term "women".*

On the 1st of January, National Higher Education Code to Prevent and Respond to Gender-based Violence (National Code) came into effect, holding universities across Australia to a new and higher standard of consent education, reporting and disclosure processes and data collection. This Code was an initiative pushed for by the National Union of Students (NUS) and the STOP campaign, following years of student advocacy from around Australia.

The National Code is long overdue, especially in a climate of rising rates of femicide and violence against women around Australia. For far too long, universities (especially the ANU) have neglected their responsibility to keep students safe. Their inadequate preventative measures have allowed and blind-sided the detrimental impacts of Domestic Violence and the generational trauma this triggers. As a place of development, change, and new beginnings for most people, especially victims of DV who come to university to rewrite their story, it is of utmost importance for the university to assist and aid their students in doing so.

With that being said, it is crucial for the ANU to implement the National Code immediately and effectively. This cannot turn into some performative measure for the ANU to use as some mechanism to make themselves seem progressive and unproblematic. Student safety must be prioritised over the ANU’s liability.

The ANU must adhere to all requirements of the code and expand beyond it to further improve the lives of women, setting a precedent for other universities to follow. It is vital for the ANU to take action, rather than rely on words without promise. Now is the perfect time to do so.`,fullText:`1. To call on the ANU and ensure that the university adheres to and implements all measures and regulations in the National Code.
2. To call on the ANU to engage in ongoing consultation with students and student leaders to ensure that the National Code is applied in the benefit of ANU students.
3. To call on the ANU to ensure that the Working Group established and required to deliver key University-wide components of compliance activities is held accountable. This includes ensuring that the data collection, analysis and external reporting practices are compliant with the National Code. This data must be applied effectively to improve students wellbelling. From the data collection, analysis and external reporting practices. The working group should deliver a review of recommendations, such as the Student Disciplinary Framework and Nixon Reviews. This review should formulate adequate and accurate reports on Domestic Violence and Gender-based Violence rates on campus and develop effective measures in preventing this violence.`,originalPreamble:`*Content Warning: Domestic and Gender-based violence, femicide. ‘National Higher Education Code to Prevent and Respond to Gender-based Violence’ is abbreviated to ‘National Code’.*

On the 1st of January, National Higher Education Code to Prevent and Respond to Gender-based Violence (National Code) came into effect, holding universities across Australia to a new and higher standard of consent education, reporting and disclosure processes and data collection. This Code was an initiative pushed for by the National Union of Students (NUS) and the STOP campaign, following years of student advocacy from around Australia.

The National Code is long overdue, especially in a climate of rising rates of femicide and violence against female-identifying people around Australia. For far too long, universities (especially the ANU) have neglected their responsibility to keep students safe. Their inadequate preventative measures have allowed and blind-sided the detrimental impacts of Domestic Violence and the generational trauma this triggers. As a place of development, change, and new beginnings for most people, especially victims of DV who come to university to rewrite their story, it is of utmost importance for the university to assist and aid their students in doing so.

With that being said, it is crucial for the ANU to implement the National Code immediately and effectively. This cannot turn into some performative measure for the ANU to use as some mechanism to make themselves seem progressive and unproblematic. Student safety must be prioritised over the ANU’s liability.

The ANU must adhere to all requirements of the code and expand beyond it to further improve the lives of female-identifying students, setting a precedent for other universities to follow. It is vital for the ANU to take action, rather than rely on words without promise. Now is the perfect time to do so.`,mover:"Liv Yu",seconder:"Katie Jakab",minutesPage:24,type:"Motion",status:"Passed",amendments:[{text:"Replace “female-identifying people/students” with “women” in the preamble",fullText:"1. Amend the preamble of the motion to replace the uses of the terms ‘female-identifying people’ and 'female-identifying students' with the term ‘women’.",mover:"Lea Fallen",seconder:"",passed:!0,friendly:!0},{text:"Add definition of “women” to the preamble",fullText:`1. Add to the preamble, after the content warning, "This motion uses the term "women" to encompass the ANUSA Women's Department's membership as defined in their constitution. This includes all students who identify as women, and all gender diverse and intersex students who identify with the term "women"."`,mover:"Jemma Rule",seconder:"Katie Jakab",passed:!0,friendly:!0}]},vt=Object.freeze(Object.defineProperty({__proto__:null,default:bt},Symbol.toStringTag,{value:"Module"})),wt={name:"SRC 1, 2026",date:"2026-02-25",location:"Marie Reay 5.02 and Zoom",duration:"6:15 pm – 10:24 pm",minutesUrl:"https://anusa.com.au/wp-content/uploads/2026/03/Minutes-ANUSA-SRC-1-2026.pdf"},Se=Object.freeze(Object.defineProperty({__proto__:null,default:wt},Symbol.toStringTag,{value:"Module"})),At={id:"7.1",title:"ANUSA condemns arrests at Queensland Student Strike for Palestine",preamble:`We condemn the arrest of two activists, and charging of Liam Parry, at the Student Strike for Palestine in Queensland on Wednesday March 11. One person was arrested for saying the phrase “from the river to the sea” in a speech, and the other person was arrested for wearing a singlet with the phrase, though later released without charge. This comes after the state Liberal government introduced sweeping new hate speech reforms that could see Queenslanders face up to two years’ imprisonment for using the phrase.

These laws represent a clear attempt to silence opposition to Israel’s genocide in Gaza and the occupation of the Palestinian Territories. Arresting someone for the words written on their clothing raises significant constitutional and civil liberties concerns about freedom of speech and political expression in this country.

Criminalising this slogan is an attempt to intimidate the growing solidarity movement with Palestine and to silence criticism of the Israeli state at a time when its war on Gaza has provoked outrage across the globe. We call for these new laws to be repealed immediately. Students must be able to organise, protest and speak out on political issues without fear of arrest.

We encourage individuals to sign onto the Palestine Action Group open letter, available [here](https://docs.google.com/forms/d/e/1FAIpQLSdGz0voMQM2bozryw5qnQrIAUuKaOjaiCUEi-DVLJ2W6HjJYQ/viewform).`,fullText:`1. The ANUSA SRC recommends the President sign onto the open letter by Palestine Action Group demanding that the charges against the two activists be dropped, on behalf of ANUSA.
2. ANUSA SRC condemns the Queensland government’s new hate speech laws as a draconian attack on free speech and political expression.
3. ANUSA SRC calls on the Queensland government to repeal the new hate speech laws immediately.
4. ANUSA SRC reaffirms that pro-Palestine speech, including phrases calling for equal rights for Palestinians, is not antisemitic.`,mover:"Tamsyn",seconder:"Josh",minutesPage:17,type:"Motion",status:"Passed",amendments:[]},kt=Object.freeze(Object.defineProperty({__proto__:null,default:At},Symbol.toStringTag,{value:"Module"})),St={id:"7.2",title:"Condemn terrorism against First Nations people: Boorloo Invasion Day Terror Attack",preamble:`On the 26th January 2026, during an Invasion Day rally in Boorloo (Perth), a 31-year old man, Liam Alexander Hall, threw a homemade fragment bomb from a balcony into the crowd of around 2,500 people that had gathered for the rally in Perth’s CBD. The bomb did not detonate, however the rally was forced to disperse due to the potential lethal threat presented.

Following a 9 day investigation by the Australian Federal Police, WA Police and ASIO the action was declared an act of terrorism. It was found that the man had engaged with hateful, white-supremicist content online and became the first person to be charged with terrorism offences in Western Australia. WA Premier Roger Cook reiterated that if the bomb detonated there could have been a, “mass casualty event”.

Aboriginal and Torres Strait Islanders have every right to feel safe in the country they’ve lived in for over 65,000 years. This attempted terror attack is still a reminder that racist hate and violence against First Nations people is still very present in this country and has left us feeling less safe and scared for our wellbeing. The radio-silence and lackluster response from many of our political leaders, including the Prime Minister, has again left First Nations people feeling their long-held concerns about racism are being ignored. Aboriginal and Torres Strait Islander Social Justice Commissioner, Katie Kiss noted that the silence from many political leaders, “Sends a message that Aboriginal and Torres Islander people do not matter”.

As a Student Union which strives to fight against racism, it is crucial that the white supremacist-fulled terrorist threat against a gathering of First Nations people on a day of mourning is condemned.`,fullText:`1. ANUSA condemns the attempted terrorist attack against First Nations people in Perth on January 26.
2. ANUSA condemns racism against First Nations people in all forms, especially on university campuses.
3. ANUSA condemns the lacklustre and ignorant response from national political leaders and the negative message it sends to First Nations people who feel ignored, unrepresented and less safe from racism in their communities.
4. ANUSA endorses the establishment of the Parliamentary Inquiry into racism, hate and violence directed at Aboriginal and Torres Strait Islander people`,mover:"Tom Hughes",seconder:"Leila Clarke",minutesPage:19,type:"Motion",status:"Passed",amendments:[]},xt=Object.freeze(Object.defineProperty({__proto__:null,default:St},Symbol.toStringTag,{value:"Module"})),Nt={id:"7.3",title:"ENOUGH IS ENOUGH! Make the ANU act on the Racism@Uni study!",preamble:`In February of this year, the Australian Human Rights Commission released the results from its landmark Racism@Uni Study, which was the largest and most comprehensive examination of racism at Australian institutions to date. More than 76,000 students and staff across 42 Australian universities were participants in the study, and the results shed light on the harsh reality that BIPOC Students have consistently been enduring. The study identifies consistent patterns of racial discrimination, exclusion and inadequacy in institutional responses, disproportionately affecting already vulnerable groups like Palestinian, Jewish, Muslim and First Nations students. Students across the country demonstrate a deep distrust in their Universities to carefully and competently handle disclosures and reports.
